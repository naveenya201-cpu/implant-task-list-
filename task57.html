<!DOCTYPE html>
<html>
<head>
  <title>Simple Lightbox</title>
  <style>
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      text-align: center;
    }

    #lightbox img {
      max-width: 80%;
      max-height: 80%;
      margin-top: 5%;
    }

    .thumb {
      width: 200px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <img src="image.jpg" class="thumb" onclick="openLightbox()">

  <div id="lightbox" onclick="closeLightbox()">
    <img src="https://picsum.photos/400/300" alt="Sample Image">
  </div>

  <script>
    function openLightbox() {
      document.getElementById("lightbox").style.display = "block";
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Footer Example</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .content {
            min-height: 90vh;
            padding: 20px;
        }

        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .footer a {
            color: #ffd700;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Website Content</h1>
        <p>Your page content goes here.</p>
    </div>

    <div class="footer">
        <p>&copy; 2026 My Website. All Rights Reserved.</p>

        <p>
            <a href="#">About</a> |
            <a href="#">Services</a> |
            <a href="#">Contact</a> |
            <a href="#">Privacy Policy</a>
        </p>
    </div>

</body>
</html>

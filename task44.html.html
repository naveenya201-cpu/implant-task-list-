<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
    scroll-behavior:smooth;
}

body{
    background:#0f172a;
    color:white;
}

/* Navbar */
header{
    position:fixed;
    top:0;
    width:100%;
    background:#111827;
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    z-index:1000;
}

nav a{
    color:#cbd5e1;
    margin-left:15px;
    text-decoration:none;
}

nav a:hover{
    color:white;
}

/* Hero */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding-top:60px;
}

.hero h1{
    font-size:40px;
    margin-bottom:10px;
}

.typing{
    color:#38bdf8;
    font-weight:bold;
    font-size:22px;
    border-right:2px solid white;
    white-space:nowrap;
    overflow:hidden;
}

/* Sections */
section{
    padding:80px 20px;
    max-width:1100px;
    margin:auto;
}

/* Projects */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:12px;
    transition:0.4s;
    opacity:0;
    transform:translateY(50px);
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

.card:hover{
    transform:scale(1.05);
}

/* Skills */
.skills{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.skill{
    background:#2563eb;
    padding:10px 15px;
    border-radius:20px;
}

/* Contact */
form input, form textarea{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    border:none;
}

button{
    padding:10px 15px;
    border:none;
    background:#38bdf8;
    color:black;
    border-radius:6px;
    cursor:pointer;
}

/* Fade animation */
.fade{
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}
</style>
</head>
<body>

<header>
    <div><strong>MyPortfolio</strong></div>
    <nav>
        <a href="#home">Home</a>
        <a href="#projects">Projects</a>
        <a href="#skills">Skills</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- Hero -->
<section class="hero" id="home">
    <h1>Hi, I'm a Developer 👋</h1>
    <div class="typing" id="typing"></div>
</section>

<!-- Projects -->
<section id="projects">
    <h2 class="fade">Projects</h2>

    <div class="grid">
        <div class="card fade">E-commerce Website</div>
        <div class="card fade">Banking Dashboard</div>
        <div class="card fade">Social Media UI</div>
        <div class="card fade">Chat Application</div>
    </div>
</section>

<!-- Skills -->
<section id="skills">
    <h2 class="fade">Skills</h2>

    <div class="skills fade">
        <div class="skill">HTML</div>
        <div class="skill">CSS</div>
        <div class="skill">JavaScript</div>
        <div class="skill">React</div>
        <div class="skill">Node.js</div>
    </div>
</section>

<!-- Contact -->
<section id="contact">
    <h2 class="fade">Contact Me</h2>

    <form class="fade">
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <textarea placeholder="Message"></textarea>
        <button type="button">Send</button>
    </form>
</section>

<script>

/* Typing animation */
const text = "Frontend Developer | UI Designer | JavaScript Enthusiast";
let i = 0;

function typingEffect(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect,80);
    }
}
typingEffect();

/* Scroll animation */
const elements = document.querySelectorAll(".fade, .card");

window.addEventListener("scroll", ()=>{
    elements.forEach(el=>{
        const top = el.getBoundingClientRect().top;

        if(top < window.innerHeight - 100){
            el.classList.add("show");
        }
    });
});
</script>

</body>
</html>

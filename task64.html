<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drag & Drop UI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .box {
      width: 250px;
      min-height: 300px;
      background: white;
      border: 2px dashed #ccc;
      border-radius: 10px;
      padding: 10px;
    }

    .box h3 {
      text-align: center;
    }

    .item {
      background: #3498db;
      color: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      cursor: grab;
    }

    .item:active {
      cursor: grabbing;
    }

    .box.drag-over {
      background: #eaf4ff;
      border-color: #3498db;
    }
  </style>
</head>

<body>

<h2>🧲 Drag & Drop UI</h2>

<div class="container">

  <div class="box" id="box1" ondragover="allowDrop(event)" ondrop="drop(event)">
    <h3>Box 1</h3>
    <div class="item" draggable="true" id="item1" ondragstart="drag(event)">Item 1</div>
    <div class="item" draggable="true" id="item2" ondragstart="drag(event)">Item 2</div>
  </div>

  <div class="box" id="box2" ondragover="allowDrop(event)" ondrop="drop(event)">
    <h3>Box 2</h3>
  </div>

</div>

<script>
  function drag(event) {
    event.dataTransfer.setData("text", event.target.id);
  }

  function allowDrop(event) {
    event.preventDefault();
    event.currentTarget.classList.add("drag-over");
  }

  function drop(event) {
    event.preventDefault();

    const id = event.dataTransfer.getData("text");
    const draggedItem = document.getElementById(id);

    event.currentTarget.appendChild(draggedItem);
    event.currentTarget.classList.remove("drag-over");
  }

  // Remove highlight when drag leaves
  document.querySelectorAll(".box").forEach(box => {
    box.addEventListener("dragleave", () => {
      box.classList.remove("drag-over");
    });
  });
</script>

</body>
</html>

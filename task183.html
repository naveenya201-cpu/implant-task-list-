<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hotel Booking Platform</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6f7;
    }

    /* Navbar */
    .navbar {
      background: #ffffff;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }

    .navbar h1 {
      color: #0077ff;
      margin: 0;
    }

    .navbar a {
      margin-left: 15px;
      text-decoration: none;
      color: #333;
    }

    /* Hero */
    .hero {
      background: linear-gradient(to right, #0077ff, #00c6ff);
      color: white;
      padding: 50px 20px;
      text-align: center;
    }

    .search-box {
      margin-top: 20px;
    }

    .search-box input {
      padding: 12px;
      width: 200px;
      border: none;
      border-radius: 5px;
      margin: 5px;
    }

    .search-box button {
      padding: 12px 20px;
      border: none;
      background: #ffcc00;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    /* Container */
    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    /* Hotel Card */
    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .rating {
      color: #ff9800;
      font-weight: bold;
    }

    .price {
      font-size: 18px;
      color: #0077ff;
      font-weight: bold;
      margin: 10px 0;
    }

    .card button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #0077ff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .card button:hover {
      background: #005fd1;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <h1>StayBook</h1>
    <div>
      <a href="#">Home</a>
      <a href="#">Hotels</a>
      <a href="#">Deals</a>
      <a href="#">Login</a>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <h2>Find Your Perfect Stay</h2>
    <p>Search hotels, compare prices, and book easily</p>

    <div class="search-box">
      <input type="text" placeholder="City or Hotel">
      <input type="date">
      <input type="date">
      <button>Search</button>
    </div>
  </div>

  <!-- Hotel Listings -->
  <div class="container">

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?hotel" />
      <div class="card-content">
        <h3>Grand Palace Hotel</h3>
        <p class="rating">⭐ 4.5 (2,134 reviews)</p>
        <p class="price">₹4,500 / night</p>
        <button>Book Now</button>
      </div>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?resort" />
      <div class="card-content">
        <h3>Sea View Resort</h3>
        <p class="rating">⭐ 4.3 (1,120 reviews)</p>
        <p class="price">₹6,200 / night</p>
        <button>Book Now</button>
      </div>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?luxury-hotel" />
      <div class="card-content">
        <h3>Luxury Stay Inn</h3>
        <p class="rating">⭐ 4.7 (3,450 reviews)</p>
        <p class="price">₹8,900 / night</p>
        <button>Book Now</button>
      </div>
    </div>

  </div>

</body>
</html>

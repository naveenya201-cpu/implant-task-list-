<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Timeline</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 40px 20px;
      background: #f4f6f8;
    }

    h2 {
      text-align: center;
      margin-bottom: 40px;
    }

    /* Timeline container */
    .timeline {
      position: relative;
      max-width: 900px;
      margin: auto;
    }

    /* Center line */
    .timeline::after {
      content: '';
      position: absolute;
      width: 4px;
      background: #3498db;
      top: 0;
      bottom: 0;
      left: 50%;
      margin-left: -2px;
    }

    /* Timeline item */
    .item {
      padding: 20px 30px;
      position: relative;
      width: 50%;
    }

    .item .content {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Left side */
    .left {
      left: 0;
    }

    /* Right side */
    .right {
      left: 50%;
    }

    /* Circle marker */
    .item::before {
      content: '';
      position: absolute;
      width: 15px;
      height: 15px;
      background: white;
      border: 4px solid #3498db;
      top: 20px;
      border-radius: 50%;
      z-index: 1;
    }

    .left::before {
      right: -10px;
    }

    .right::before {
      left: -10px;
    }

    /* Responsive */
    @media (max-width: 768px) {

      .timeline::after {
        left: 20px;
      }

      .item {
        width: 100%;
        padding-left: 60px;
        padding-right: 20px;
      }

      .right {
        left: 0;
      }

      .left::before,
      .right::before {
        left: 10px;
      }
    }
  </style>
</head>

<body>

<h2>🕒 My Timeline</h2>

<div class="timeline">

  <div class="item left">
    <div class="content">
      <h3>2022</h3>
      <p>Started learning web development.</p>
    </div>
  </div>

  <div class="item right">
    <div class="content">
      <h3>2023</h3>
      <p>Built first real-world projects.</p>
    </div>
  </div>

  <div class="item left">
    <div class="content">
      <h3>2024</h3>
      <p>Learned JavaScript frameworks.</p>
    </div>
  </div>

  <div class="item right">
    <div class="content">
      <h3>2025</h3>
      <p>Started advanced UI/UX design.</p>
    </div>
  </div>

</div>

</body>
</html>

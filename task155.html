<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reusable UI Components</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --primary:#6366f1;
    --accent:#06b6d4;
    --text:#f8fafc;
    --muted:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    padding:40px;
}

/* Layout */
.container{
    max-width:1000px;
    margin:auto;
}

.section-title{
    margin:40px 0 15px;
    color:var(--accent);
}

/* BUTTONS */
.btn{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
    margin:5px;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-primary:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(99,102,241,.3);
}

.btn-outline{
    background:transparent;
    border:1px solid var(--accent);
    color:var(--accent);
}

.btn-outline:hover{
    background:var(--accent);
    color:#000;
}

/* CARD */
.card{
    background:var(--card);
    padding:20px;
    border-radius:15px;
    margin:10px 0;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* INPUT */
.input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    margin:8px 0;
    background:#0f172a;
    color:white;
    border:1px solid #334155;
}

.input:focus{
    border-color:var(--accent);
    box-shadow:0 0 10px rgba(6,182,212,.3);
}

/* BADGE */
.badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    background:var(--accent);
    color:#000;
}

/* MODAL */
.modal-bg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal{
    background:var(--card);
    padding:25px;
    border-radius:15px;
    width:300px;
    animation:pop .3s ease;
}

@keyframes pop{
    from{transform:scale(.8); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* NAVBAR */
.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#1e293b;
    border-radius:12px;
}

.nav a{
    color:var(--text);
    text-decoration:none;
    margin:0 10px;
    transition:.3s;
}

.nav a:hover{
    color:var(--accent);
}
</style>
</head>
<body>

<div class="container">

    <!-- NAVBAR COMPONENT -->
    <div class="nav">
        <h3>UI Kit</h3>
        <div>
            <a href="#">Home</a>
            <a href="#">Docs</a>
            <a href="#">About</a>
        </div>
    </div>

    <!-- BUTTONS -->
    <h2 class="section-title">Buttons</h2>

    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-outline">Outline</button>

    <!-- CARD -->
    <h2 class="section-title">Cards</h2>

    <div class="card">
        <span class="badge">New</span>
        <h3>Reusable Card</h3>
        <p>This card can be reused anywhere in your UI system.</p>
    </div>

    <!-- INPUT -->
    <h2 class="section-title">Form Inputs</h2>

    <input class="input" placeholder="Enter your name">
    <input class="input" placeholder="Email address">

    <button class="btn btn-primary">Submit</button>

    <!-- MODAL -->
    <h2 class="section-title">Modal</h2>

    <button class="btn btn-primary" onclick="openModal()">
        Open Modal
    </button>

</div>

<!-- MODAL STRUCTURE -->
<div class="modal-bg" id="modal">
    <div class="modal">
        <h3>Reusable Modal</h3>
        <p>This is a reusable popup component.</p>
        <br>
        <button class="btn btn-primary" onclick="closeModal()">
            Close
        </button>
    </div>
</div>

<script>
function openModal(){
    document.getElementById("modal")
    .style.display = "flex";
}

function closeModal(){
    document.getElementById("modal")
    .style.display = "none";
}
</script>

</body>
</html>

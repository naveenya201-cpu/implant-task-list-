<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>User Interview Tool</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
    display: flex;
    justify-content: center;
    padding: 40px;
  }

  .container {
    width: 100%;
    max-width: 600px;
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  label {
    display: block;
    margin-top: 15px;
    font-size: 14px;
    color: #cbd5e1;
  }

  input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  textarea {
    height: 80px;
    resize: none;
  }

  button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #0ea5e9;
  }

  .responses {
    margin-top: 30px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
    font-size: 14px;
  }

  .small {
    font-size: 12px;
    color: #94a3b8;
  }
</style>
</head>

<body>

<div class="container">

  <h1>User Interview Form</h1>

  <label>1. Name</label>
  <input id="name" placeholder="Enter name" />

  <label>2. Business / Role</label>
  <input id="role" placeholder="e.g. Founder, Shop Owner" />

  <label>3. How do you currently get customers?</label>
  <textarea id="q1"></textarea>

  <label>4. Biggest marketing challenge?</label>
  <textarea id="q2"></textarea>

  <label>5. Last time you tried solving it?</label>
  <textarea id="q3"></textarea>

  <label>6. What tools do you use?</label>
  <textarea id="q4"></textarea>

  <button onclick="saveResponse()">Save Interview</button>

  <div class="responses">
    <h2>Saved Responses</h2>
    <div id="list"></div>
  </div>

</div>

<script>
  let responses = JSON.parse(localStorage.getItem("interviews") || "[]");

  function saveResponse() {
    const data = {
      name: document.getElementById("name").value,
      role: document.getElementById("role").value,
      q1: document.getElementById("q1").value,
      q2: document.getElementById("q2").value,
      q3: document.getElementById("q3").value,
      q4: document.getElementById("q4").value,
      time: new Date().toLocaleString()
    };

    responses.push(data);
    localStorage.setItem("interviews", JSON.stringify(responses));

    alert("Interview saved!");
    render();
    clearForm();
  }

  function clearForm() {
    document.getElementById("name").value = "";
    document.getElementById("role").value = "";
    document.getElementById("q1").value = "";
    document.getElementById("q2").value = "";
    document.getElementById("q3").value = "";
    document.getElementById("q4").value = "";
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    responses.forEach((r, i) => {
      list.innerHTML += `
        <div class="card">
          <b>${r.name}</b> <span class="small">(${r.role})</span><br/>
          <span class="small">${r.time}</span><br/><br/>
          <b>Customers:</b> ${r.q1}<br/>
          <b>Challenge:</b> ${r.q2}<br/>
          <b>Last attempt:</b> ${r.q3}<br/>
          <b>Tools:</b> ${r.q4}
        </div>
      `;
    });
  }

  render();
</script>

</body>
</html>

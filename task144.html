<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking System Wireframe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:#F8FAFC;
    padding:30px;
}

.booking-app{
    max-width:1400px;
    margin:auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:24px;
}

/* Main Panel */
.main-panel{
    background:white;
    border-radius:20px;
    padding:24px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.header{
    height:70px;
    border:2px dashed #CBD5E1;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:24px;
}

/* Progress */
.progress{
    display:flex;
    gap:12px;
    margin-bottom:24px;
}

.step{
    flex:1;
    height:50px;
    border-radius:12px;
    border:2px dashed #14B8A6;
    display:flex;
    align-items:center;
    justify-content:center;
}

.active{
    background:#14B8A6;
    color:white;
}

/* Calendar Area */
.calendar{
    height:320px;
    border:2px dashed #CBD5E1;
    border-radius:16px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#64748B;
    margin-bottom:24px;
}

/* Time Slots */
.slots{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

.slot{
    height:55px;
    border:2px dashed #CBD5E1;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Summary Panel */
.sidebar{
    background:white;
    border-radius:20px;
    padding:24px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    display:flex;
    flex-direction:column;
    gap:20px;
}

.summary-card{
    height:120px;
    border:2px dashed #CBD5E1;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#64748B;
}

.details{
    height:220px;
    border:2px dashed #CBD5E1;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#64748B;
}

.button{
    margin-top:auto;
    background:#14B8A6;
    color:white;
    text-align:center;
    padding:16px;
    border-radius:12px;
    font-weight:600;
}
</style>
</head>

<body>

<div class="booking-app">

    <!-- Main Booking Area -->
    <section class="main-panel">

        <div class="header">
            Booking System Header
        </div>

        <div class="progress">
            <div class="step active">1. Select Date</div>
            <div class="step">2. Choose Time</div>
            <div class="step">3. Confirm</div>
        </div>

        <div class="calendar">
            Calendar / Date Picker
        </div>

        <div class="slots">
            <div class="slot">09:00</div>
            <div class="slot">10:00</div>
            <div class="slot">11:00</div>
            <div class="slot">12:00</div>
            <div class="slot">14:00</div>
            <div class="slot">15:00</div>
            <div class="slot">16:00</div>
            <div class="slot">17:00</div>
        </div>

    </section>

    <!-- Booking Summary -->
    <aside class="sidebar">

        <div class="summary-card">
            Service / Resource Card
        </div>

        <div class="details">
            Booking Summary Details
        </div>

        <div class="button">
            Continue Booking
        </div>

    </aside>

</div>

</body>
</html>

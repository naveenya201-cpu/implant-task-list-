<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Delivery UI</title>
<style>
  body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
  }

  header {
    background: #ff4d4d;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
  }

  .search {
    padding: 10px;
    text-align: center;
  }

  .search input {
    width: 90%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }

  .card {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
  }

  .btn {
    background: #ff4d4d;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    margin-top: 10px;
  }

  footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    border-top: 1px solid #ddd;
  }
</style>
</head>

<body>

<header>
  🍔 Food Delivery App
</header>

<div class="search">
  <input type="text" placeholder="Search food...">
</div>

<div class="card">
  <h3>Pizza</h3>
  <p>Cheesy delicious pizza</p>
  <button class="btn">Order</button>
</div>

<div class="card">
  <h3>Burger</h3>
  <p>Juicy beef burger</p>
  <button class="btn">Order</button>
</div>

<div class="card">
  <h3>Biryani</h3>
  <p>Spicy chicken biryani</p>
  <button class="btn">Order</button>
</div>

<footer>
  <span>🏠 Home</span>
  <span>🔍 Search</span>
  <span>🛒 Cart</span>
  <span>👤 Profile</span>
</footer>

</body>
</html>

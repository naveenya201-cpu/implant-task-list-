<!DOCTYPE html>
<html>
<head>
    <title>Pricing Table</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 40px;
        }

        .pricing-container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .pricing-card {
            width: 250px;
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 10px lightgray;
        }

        .pricing-card h2 {
            color: #333;
        }

        .price {
            font-size: 32px;
            color: #007BFF;
            margin: 15px 0;
        }

        .pricing-card ul {
            list-style: none;
            padding: 0;
        }

        .pricing-card ul li {
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }

        .pricing-card button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div class="pricing-container">

        <div class="pricing-card">
            <h2>Basic</h2>
            <div class="price">$9/month</div>

            <ul>
                <li>5 Projects</li>
                <li>10 GB Storage</li>
                <li>Email Support</li>
            </ul>

            <button>Choose Plan</button>
        </div>

        <div class="pricing-card featured">
            <h2>Standard</h2>
            <div class="price">$19/month</div>

            <ul>
                <li>20 Projects</li>
                <li>50 GB Storage</li>
                <li>Priority Support</li>
            </ul>

            <button>Choose Plan</button>
        </div>

        <div class="pricing-card">
            <h2>Premium</h2>
            <div class="price">$39/month</div>

            <ul>
                <li>Unlimited Projects</li>
                <li>200 GB Storage</li>
                <li>24/7 Support</li>
            </ul>

            <button>Choose Plan</button>
        </div>

    </div>

</body>
</html>

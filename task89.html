<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .profile-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px lightgray;
        }

        .profile-header {
            text-align: center;
        }

        .profile-header img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }

        .profile-header h2 {
            margin: 10px 0;
        }

        .profile-info {
            margin-top: 20px;
        }

        .profile-info p {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .edit-btn {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            margin-top: 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        .edit-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="profile-container">

        <div class="profile-header">
            <img src="image./1.png" alt="Profile Picture">
            <h2>lia </h2>
            <p>Web Developer</p>
        </div>

        <div class="profile-info">
            <p><strong>Email:</strong> lia123.com</p>
            <p><strong>Phone:</strong> +91 9876543210</p>
            <p><strong>Location:</strong> Chennai, India</p>
            <p><strong>Gender:</strong> female</p>
        </div>

        <button class="edit-btn">Edit Profile</button>

    </div>

</body>
</html>

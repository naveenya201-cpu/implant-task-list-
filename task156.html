<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Component Variants System</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --muted:#94a3b8;
    --primary:#6366f1;
    --success:#10b981;
    --danger:#ef4444;
    --border:#334155;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    padding:40px;
}

/* Layout */
.container{
    max-width:900px;
    margin:auto;
}

.section{
    margin-bottom:40px;
}

/* ================= BUTTON VARIANTS ================= */

.btn{
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:.25s;
    margin:6px;
}

/* Sizes */
.btn-sm{ padding:6px 12px; font-size:12px; }
.btn-md{ padding:10px 16px; font-size:14px; }
.btn-lg{ padding:14px 22px; font-size:16px; }

/* Variants */
.btn-primary{ background:var(--primary); color:white; }
.btn-secondary{ background:#334155; color:white; }
.btn-ghost{ background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-danger{ background:var(--danger); color:white; }

.btn:hover{
    transform:translateY(-3px);
    opacity:0.9;
}

/* ================= CARD VARIANTS ================= */

.card{
    padding:20px;
    border-radius:15px;
    margin:10px 0;
    transition:.3s;
}

.card-default{
    background:var(--card);
}

.card-elevated{
    background:var(--card);
    box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.card-outlined{
    background:transparent;
    border:1px solid var(--border);
}

/* ================= INPUT VARIANTS ================= */

.input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#0f172a;
    color:var(--text);
    outline:none;
    margin:6px 0;
    transition:.25s;
}

.input:focus{
    border-color:var(--primary);
    box-shadow:0 0 10px rgba(99,102,241,.3);
}

.input:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

/* Badge */
.badge{
    display:inline-block;
    padding:4px 10px;
    font-size:12px;
    border-radius:20px;
    background:var(--success);
    color:black;
}

/* Controls */
.controls{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
}

label{
    margin-right:10px;
}
</style>
</head>
<body>

<div class="container">

    <h1>Component Variants System</h1>

    <!-- CONTROLS -->
    <div class="controls">
        <label>Card Style:</label>
        <select onchange="setCard(this.value)">
            <option value="card-default">Default</option>
            <option value="card-elevated">Elevated</option>
            <option value="card-outlined">Outlined</option>
        </select>
    </div>

    <!-- BUTTON VARIANTS -->
    <div class="section">
        <h2>Buttons</h2>

        <button class="btn btn-primary btn-sm">Primary SM</button>
        <button class="btn btn-primary btn-md">Primary MD</button>
        <button class="btn btn-primary btn-lg">Primary LG</button>

        <button class="btn btn-secondary btn-md">Secondary</button>
        <button class="btn btn-ghost btn-md">Ghost</button>
        <button class="btn btn-danger btn-md">Danger</button>
    </div>

    <!-- CARD VARIANTS -->
    <div class="section">
        <h2>Cards</h2>

        <div id="card" class="card card-default">
            <span class="badge">Active</span>
            <h3>Variant Card</h3>
            <p>This card changes style dynamically.</p>
        </div>
    </div>

    <!-- INPUT VARIANTS -->
    <div class="section">
        <h2>Inputs</h2>

        <input class="input" placeholder="Normal input">
        <input class="input" placeholder="Focused input (click me)">
        <input class="input" placeholder="Disabled input" disabled>
    </div>

</div>

<script>
function setCard(type){
    const card = document.getElementById("card");

    card.className = "card " + type;
}
</script>

</body>
</html>

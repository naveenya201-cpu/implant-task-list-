<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Navigation bar</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    nav {
        background: #530560;
        padding: 10px 20px;
    }

    .navbar {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .navbar a {
        color: rgb(221, 133, 133);
        text-decoration: none;
        padding: 8px 12px;
    }

    .navbar a:hover {
        background: #555;
        border-radius: 4px;
    }

    /* Mobile */
    @media (max-width: 600px) {
        .navbar {
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
    }
</style>
</head>
<body>

<nav>
    <ul class="navbar">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

</body>
</html>

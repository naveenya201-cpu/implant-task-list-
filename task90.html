<!DOCTYPE html>
<html>
<head>
    <title>Settings Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .settings-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px lightgray;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .setting-item {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .checkbox {
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="settings-container">
        <h2>Settings</h2>

        <div class="setting-item">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">
        </div>

        <div class="setting-item">
            <label>Email</label>
            <input type="email" placeholder="Enter your email">
        </div>

        <div class="setting-item">
            <label>Language</label>
            <select>
                <option>English</option>
                <option>Tamil</option>
                <option>Hindi</option>
            </select>
        </div>

        <div class="checkbox">
            <input type="checkbox" id="notify">
            <label for="notify">
                Enable Notifications
            </label>
        </div>

        <br>

        <button>Save Settings</button>
    </div>

</body>
</html>

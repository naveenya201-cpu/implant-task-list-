<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0b1220;
    color:#e5e7eb;
}

/* Sidebar */
.sidebar{
    width:240px;
    height:100vh;
    position:fixed;
    background:#111827;
    padding:20px;
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:#38bdf8;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:#cbd5e1;
    text-decoration:none;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
}

.sidebar a:hover{
    background:#1f2937;
    color:white;
}

/* Main */
.main{
    margin-left:240px;
    padding:20px;
}

/* Topbar */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.topbar input{
    padding:10px;
    width:250px;
    border-radius:8px;
    border:none;
    background:#1f2937;
    color:white;
}

/* KPI Cards */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.card h3{
    color:#9ca3af;
    font-size:14px;
}

.card h2{
    margin-top:10px;
}

/* Charts */
.grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

.box{
    background:#111827;
    padding:20px;
    border-radius:12px;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    background:#111827;
    border-radius:12px;
    overflow:hidden;
}

th, td{
    padding:12px;
    border-bottom:1px solid #1f2937;
}

th{
    color:#9ca3af;
}

.positive{ color:#22c55e; }
.negative{ color:#ef4444; }

/* Responsive */
@media(max-width:900px){
    .grid{
        grid-template-columns:1fr;
    }

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        margin-left:0;
    }
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">AnalyticsX</div>
    <a href="#">Dashboard</a>
    <a href="#">Traffic</a>
    <a href="#">Users</a>
    <a href="#">Revenue</a>
    <a href="#">Reports</a>
</div>

<div class="main">

    <div class="topbar">
        <h2>Analytics Dashboard</h2>
        <input type="text" placeholder="Search metrics...">
    </div>

    <!-- KPI Cards -->
    <div class="cards">
        <div class="card">
            <h3>Visitors</h3>
            <h2>124,560</h2>
        </div>

        <div class="card">
            <h3>Bounce Rate</h3>
            <h2>32%</h2>
        </div>

        <div class="card">
            <h3>Conversions</h3>
            <h2>8,430</h2>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <h2>$98,200</h2>
        </div>
    </div>

    <!-- Charts -->
    <div class="grid">

        <div class="box">
            <h3>Traffic Overview</h3>
            <canvas id="trafficChart"></canvas>
        </div>

        <div class="box">
            <h3>Device Usage</h3>
            <canvas id="deviceChart"></canvas>
        </div>

    </div>

    <!-- Table -->
    <div class="box">
        <h3>Top Pages</h3>
        <table>
            <tr>
                <th>Page</th>
                <th>Views</th>
                <th>Change</th>
            </tr>

            <tr>
                <td>/home</td>
                <td>45,000</td>
                <td class="positive">+12%</td>
            </tr>

            <tr>
                <td>/products</td>
                <td>32,500</td>
                <td class="positive">+8%</td>
            </tr>

            <tr>
                <td>/checkout</td>
                <td>12,200</td>
                <td class="negative">-3%</td>
            </tr>
        </table>
    </div>

</div>

<script>
// Line Chart
new Chart(document.getElementById('trafficChart'), {
    type: 'line',
    data: {
        labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
        datasets: [{
            label: 'Visitors',
            data: [12000, 19000, 15000, 22000, 30000, 28000, 35000],
            borderColor: '#38bdf8',
            backgroundColor: 'rgba(56,189,248,0.2)',
            fill: true,
            tension: 0.4
        }]
    },
    options: {
        plugins: { legend: { labels: { color:'#e5e7eb' } } },
        scales: {
            x: { ticks: { color:'#9ca3af' } },
            y: { ticks: { color:'#9ca3af' } }
        }
    }
});

// Pie Chart
new Chart(document.getElementById('deviceChart'), {
    type: 'doughnut',
    data: {
        labels: ['Desktop','Mobile','Tablet'],
        datasets: [{
            data: [55, 35, 10],
            backgroundColor: ['#38bdf8','#22c55e','#f59e0b']
        }]
    },
    options: {
        plugins: {
            legend: {
                labels: { color:'#e5e7eb' }
            }
        }
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart TV App UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#1e1e1e;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#00c3ff;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
}

.hero{
    height:350px;
    background:linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.8)),
    url('https://picsum.photos/1200/500');
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding-left:50px;
}

.hero h1{
    font-size:48px;
    margin-bottom:10px;
}

.hero p{
    max-width:500px;
    color:#ddd;
    margin-bottom:20px;
}

.btn{
    background:#00c3ff;
    color:black;
    border:none;
    padding:12px 25px;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;
    width:150px;
}

.section{
    padding:25px 40px;
}

.section h2{
    margin-bottom:15px;
}

.row{
    display:flex;
    gap:15px;
    overflow-x:auto;
}

.card{
    min-width:220px;
    height:130px;
    border-radius:10px;
    background:#222;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    transition:0.3s;
}

.card:hover,
.card:focus{
    transform:scale(1.08);
    border:3px solid #00c3ff;
    outline:none;
}

footer{
    text-align:center;
    padding:20px;
    color:#888;
}
</style>
</head>

<body>

<header>
    <div class="logo">TVStream</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Movies</a>
        <a href="#">Series</a>
        <a href="#">Kids</a>
    </nav>
</header>

<section class="hero">
    <h1>Featured Movie</h1>
    <p>
        Enjoy the latest blockbuster in stunning 4K quality on your Smart TV.
    </p>
    <button class="btn">▶ Play</button>
</section>

<section class="section">
    <h2>Trending Now</h2>
    <div class="row">
        <div class="card" tabindex="0">Movie 1</div>
        <div class="card" tabindex="0">Movie 2</div>
        <div class="card" tabindex="0">Movie 3</div>
        <div class="card" tabindex="0">Movie 4</div>
        <div class="card" tabindex="0">Movie 5</div>
    </div>
</section>

<section class="section">
    <h2>Recommended</h2>
    <div class="row">
        <div class="card" tabindex="0">Show A</div>
        <div class="card" tabindex="0">Show B</div>
        <div class="card" tabindex="0">Show C</div>
        <div class="card" tabindex="0">Show D</div>
    </div>
</section>

<footer>
    Smart TV App UI Demo
</footer>

</body>
</html>

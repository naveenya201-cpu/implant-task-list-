<!DOCTYPE html>
<html>
<head>
    <title>Sidebar Menu</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background-color: #2c3e50;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 20px;
        }

        .sidebar h2 {
            color: white;
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 20px;
        }

        .sidebar a:hover {
            background-color: #34495e;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Menu</h2>

        <a href="#">🏠 Home</a>
        <a href="#">👤 Profile</a>
        <a href="#">📋 Dashboard</a>
        <a href="#">⚙ Settings</a>
        <a href="#">📞 Contact</a>
        <a href="#">🚪 Logout</a>
    </div>

    <div class="content">
        <h1>Welcome</h1>
        <p>This is the main content area.</p>
    </div>

</body>
</html>

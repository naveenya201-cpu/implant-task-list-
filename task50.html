<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Input Field</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6f9;
}

/* Container */
.box{
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    margin-bottom:15px;
}

/* OTP inputs */
.otp-container{
    display:flex;
    justify-content:center;
    gap:10px;
}

.otp-container input{
    width:45px;
    height:50px;
    text-align:center;
    font-size:20px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
    transition:0.2s;
}

.otp-container input:focus{
    border-color:#2563eb;
    box-shadow:0 0 5px rgba(37,99,235,0.4);
}

/* Button */
button{
    margin-top:15px;
    padding:10px 15px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#msg{
    margin-top:10px;
    font-size:14px;
    color:#16a34a;
}
</style>
</head>
<body>

<div class="box">
    <h2>Enter OTP 🔐</h2>

    <div class="otp-container">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
    </div>

    <button onclick="verifyOTP()">Verify</button>

    <div id="msg"></div>
</div>

<script>
const inputs = document.querySelectorAll(".otp-container input");

/* Auto focus next input */
inputs.forEach((input, index) => {

    input.addEventListener("input", () => {
        if(input.value.length === 1 && index < inputs.length - 1){
            inputs[index + 1].focus();
        }
    });

    /* Backspace support */
    input.addEventListener("keydown", (e) => {
        if(e.key === "Backspace" && input.value === "" && index > 0){
            inputs[index - 1].focus();
        }
    });
});

/* Paste OTP support */
inputs[0].addEventListener("paste", (e) => {
    let data = e.clipboardData.getData("text").split("");

    inputs.forEach((input, i) => {
        input.value = data[i] || "";
    });

    e.preventDefault();
});

/* Verify OTP */
function verifyOTP(){

    let otp = "";

    inputs.forEach(input => {
        otp += input.value;
    });

    if(otp.length < 6){
        document.getElementById("msg").style.color = "red";
        document.getElementById("msg").innerText = "Please enter complete OTP!";
        return;
    }

    document.getElementById("msg").style.color = "#16a34a";
    document.getElementById("msg").innerText =
        "OTP Verified Successfully 🎉";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Form</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      padding: 20px;
    }

    .form-container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    .row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .row .field {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 5px;
      font-size: 14px;
    }

    input, select, textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    textarea {
      resize: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2c80b4;
    }

    /* 📱 Responsive Design */
    @media (max-width: 600px) {
      .row {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <div class="form-container">
    <h2>Contact Form</h2>

    <form>
      <div class="row">
        <div class="field">
          <label>First Name</label>
          <input type="text" placeholder="navee">
        </div>

        <div class="field">
          <label>Last Name</label>
          <input type="text" placeholder="sri">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="navee123.com">
        </div>

        <div class="field">
          <label>Phone</label>
          <input type="tel" placeholder="1234567890">
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Message</label>
          <textarea rows="4" placeholder="Write your text"></textarea>
        </div>
      </div>

      <button type="submit">Submit</button>
    </form>
  </div>

</body>
</html>

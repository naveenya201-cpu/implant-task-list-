<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Navbar</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #3498db;
      padding: 15px 20px;
      color: white;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    /* Menu */
    .menu {
      display: flex;
      gap: 20px;
    }

    .menu a {
      color: white;
      text-decoration: none;
      font-size: 16px;
    }

    .menu a:hover {
      text-decoration: underline;
    }

    /* Hamburger */
    .hamburger {
      display: none;
      font-size: 24px;
      cursor: pointer;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .menu {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 60px;
        left: 0;
        width: 100%;
        background: #2980b9;
        padding: 10px 0;
      }

      .menu.active {
        display: flex;
      }

      .menu a {
        padding: 10px;
        text-align: center;
      }

      .hamburger {
        display: block;
      }
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">MySite</div>

    <div class="menu" id="menu">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("active");
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .otp-box {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            margin-bottom: 100px;
        }

        p {
            color: #666;
            font-size: 14px;
        }

        .otp-inputs {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }

        .otp-inputs input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        .resend {
            margin-top: 15px;
        }

        .resend a {
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>
<body>

    <div class="otp-box">
        <h2>OTP Verification</h2>

        <p>Enter the 4-digit OTP sent to your mobile number or email.</p>

        <form>
            <div class="otp-inputs">
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
            </div>

            <button type="submit">Verify OTP</button>
        </form>

        <div class="resend">
            <p>Didn't receive the OTP? <a href="#">Resend OTP</a></p>
        </div>
    </div>

</body>
</html>

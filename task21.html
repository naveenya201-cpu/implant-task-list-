<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

.cart-items,
.cart-summary{
    background:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.cart-item{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px 0;
    border-bottom:1px solid #eee;
}

.cart-item:last-child{
    border-bottom:none;
}

.cart-item img{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:8px;
}

.item-info{
    flex:1;
}

.item-title{
    font-size:18px;
    margin-bottom:6px;
}

.item-price{
    color:#2563eb;
    font-weight:bold;
}

.quantity{
    display:flex;
    align-items:center;
    gap:10px;
}

.quantity button{
    width:30px;
    height:30px;
    border:none;
    background:#111827;
    color:#fff;
    cursor:pointer;
    border-radius:4px;
}

.remove-btn{
    background:#dc2626;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
}

.checkout-btn{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.checkout-btn:hover{
    background:#1d4ed8;
}

@media(max-width:768px){
    .container{
        grid-template-columns:1fr;
    }

    .cart-item{
        flex-wrap:wrap;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- Cart Items -->
    <div class="cart-items">
        <h2>Shopping Cart</h2>

        <div class="cart-item" data-price="99">
            <img src="https://picsum.photos/100?1" alt="">
            <div class="item-info">
                <div class="item-title">Smart Watch</div>
                <div class="item-price">$99</div>
            </div>

            <div class="quantity">
                <button class="minus">-</button>
                <span class="qty">1</span>
                <button class="plus">+</button>
            </div>

            <button class="remove-btn">Remove</button>
        </div>

        <div class="cart-item" data-price="75">
            <img src="https://picsum.photos/100?2" alt="">
            <div class="item-info">
                <div class="item-title">Wireless Headphones</div>
                <div class="item-price">$75</div>
            </div>

            <div class="quantity">
                <button class="minus">-</button>
                <span class="qty">2</span>
                <button class="plus">+</button>
            </div>

            <button class="remove-btn">Remove</button>
        </div>

    </div>

    <!-- Summary -->
    <div class="cart-summary">
        <h2>Order Summary</h2>

        <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">$249</span>
        </div>

        <div class="summary-row">
            <span>Shipping</span>
            <span>$10</span>
        </div>

        <hr>

        <div class="summary-row">
            <strong>Total</strong>
            <strong id="total">$259</strong>
        </div>

        <button class="checkout-btn">
            Proceed to Checkout
        </button>
    </div>

</div>

<script>
const cartItems = document.querySelector('.cart-items');

function updateTotals() {
    let subtotal = 0;

    document.querySelectorAll('.cart-item').forEach(item => {
        const price = Number(item.dataset.price);
        const qty = Number(item.querySelector('.qty').textContent);

        subtotal += price * qty;
    });

    document.getElementById('subtotal').textContent =
        '$' + subtotal;

    document.getElementById('total').textContent =
        '$' + (subtotal + 10);
}

cartItems.addEventListener('click', (e) => {

    if (e.target.classList.contains('plus')) {
        const qtyEl =
            e.target.parentElement.querySelector('.qty');

        qtyEl.textContent =
            Number(qtyEl.textContent) + 1;
    }

    if (e.target.classList.contains('minus')) {
        const qtyEl =
            e.target.parentElement.querySelector('.qty');

        let qty = Number(qtyEl.textContent);

        if (qty > 1) {
            qtyEl.textContent = qty - 1;
        }
    }

    if (e.target.classList.contains('remove-btn')) {
        e.target.closest('.cart-item').remove();
    }

    updateTotals();
});

updateTotals();
</script>

</body>
</html>

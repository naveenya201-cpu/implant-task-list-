<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breadcrumb Navigation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:30px;
}

/* Container */
.container{
    max-width:800px;
    margin:auto;
}

/* Breadcrumb */
.breadcrumb{
    background:white;
    padding:12px 15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    display:flex;
    flex-wrap:wrap;
    align-items:center;
}

/* Items */
.breadcrumb a{
    text-decoration:none;
    color:#2563eb;
    font-size:14px;
    margin:0 5px;
}

/* Separator */
.breadcrumb span{
    color:#9ca3af;
    margin:0 5px;
}

/* Active */
.breadcrumb .active{
    color:#111827;
    font-weight:bold;
}

/* Hover */
.breadcrumb a:hover{
    text-decoration:underline;
}

/* Page content */
.content{
    margin-top:20px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}
</style>
</head>
<body>

<div class="container">

    <h2>Breadcrumb Navigation 🍞</h2>

    <!-- Breadcrumb -->
    <div class="breadcrumb">
        <a href="#" onclick="goHome()">Home</a>
        <span>/</span>

        <a href="#" onclick="goCategory()">Products</a>
        <span>/</span>

        <a href="#" onclick="goSub()">Electronics</a>
        <span>/</span>

        <span class="active">Mobile Phones</span>
    </div>

    <!-- Content -->
    <div class="content" id="content">
        <h3>Mobile Phones</h3>
        <p>Showing all mobile phone products...</p>
    </div>

</div>

<script>
// Simple dynamic content switch (optional demo)

function goHome(){
    document.getElementById("content").innerHTML =
    "<h3>Home</h3><p>Welcome to homepage</p>";
}

function goCategory(){
    document.getElementById("content").innerHTML =
    "<h3>Products</h3><p>Select a category</p>";
}

function goSub(){
    document.getElementById("content").innerHTML =
    "<h3>Electronics</h3><p>Browse electronics items</p>";
}
</script>

</body>
</html>

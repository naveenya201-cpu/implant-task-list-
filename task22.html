<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:30px;
}

.checkout-container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

.checkout-form,
.order-summary{
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h2{
    margin-bottom:20px;
    color:#111827;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
}

input,
select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.payment-method{
    margin-top:20px;
}

.payment-method label{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    cursor:pointer;
}

.summary-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
}

.total{
    margin-top:15px;
    padding-top:15px;
    border-top:1px solid #ddd;
    font-size:18px;
    font-weight:bold;
}

.place-order{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    background:#2563eb;
    color:#fff;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.place-order:hover{
    background:#1d4ed8;
}

@media(max-width:768px){
    .checkout-container{
        grid-template-columns:1fr;
    }

    .row{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="checkout-container">

    <!-- Billing Form -->
    <div class="checkout-form">

        <h2>Billing Details</h2>

        <div class="row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" placeholder="John">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" placeholder="Doe">
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="john@example.com">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+1 234 567 890">
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" placeholder="123 Main Street">
        </div>

        <div class="row">
            <div class="form-group">
                <label>City</label>
                <input type="text" placeholder="New York">
            </div>

            <div class="form-group">
                <label>Postal Code</label>
                <input type="text" placeholder="10001">
            </div>
        </div>

        <div class="form-group">
            <label>Country</label>
            <select>
                <option>United States</option>
                <option>India</option>
                <option>United Kingdom</option>
                <option>Canada</option>
            </select>
        </div>

        <div class="payment-method">
            <h2>Payment Method</h2>

            <label>
                <input type="radio" name="payment" checked>
                Credit / Debit Card
            </label>

            <label>
                <input type="radio" name="payment">
                PayPal
            </label>

            <label>
                <input type="radio" name="payment">
                Cash on Delivery
            </label>
        </div>

    </div>

    <!-- Order Summary -->
    <div class="order-summary">

        <h2>Order Summary</h2>

        <div class="summary-item">
            <span>Smart Watch</span>
            <span>$99</span>
        </div>

        <div class="summary-item">
            <span>Wireless Headphones</span>
            <span>$75</span>
        </div>

        <div class="summary-item">
            <span>Shipping</span>
            <span>$10</span>
        </div>

        <div class="total">
            <div class="summary-item">
                <span>Total</span>
                <span>$184</span>
            </div>
        </div>

        <button class="place-order">
            Place Order
        </button>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Effects Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:50px;
    text-align:center;
}

h1{
    margin-bottom:40px;
}

/* Button Hover */
.btn{
    background:#4f46e5;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:10px;
    cursor:pointer;
    transition:all .3s ease;
    margin:15px;
}

.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(79,70,229,.35);
}

/* Card Hover */
.card{
    width:280px;
    background:white;
    margin:30px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    transition:all .35s ease;
}

.card:hover{
    transform:translateY(-12px) scale(1.03);
    box-shadow:0 20px 35px rgba(0,0,0,.18);
}

/* Image Hover */
.image-box{
    width:300px;
    margin:30px auto;
    overflow:hidden;
    border-radius:15px;
}

.image-box img{
    width:100%;
    display:block;
    transition:transform .5s ease;
}

.image-box:hover img{
    transform:scale(1.15);
}

/* Navigation Hover */
.nav{
    margin:40px 0;
}

.nav a{
    text-decoration:none;
    color:#111827;
    font-size:18px;
    margin:0 15px;
    position:relative;
}

.nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0;
    height:3px;
    background:#4f46e5;
    transition:.3s;
}

.nav a:hover::after{
    width:100%;
}

/* Glow Effect */
.glow{
    display:inline-block;
    padding:15px 30px;
    background:#10b981;
    color:white;
    border-radius:10px;
    transition:.3s;
    cursor:pointer;
}

.glow:hover{
    box-shadow:
      0 0 15px #10b981,
      0 0 30px #10b981;
}

/* Gradient Hover */
.gradient-btn{
    margin-top:25px;
    padding:15px 30px;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
    background:linear-gradient(
        45deg,
        #4f46e5,
        #06b6d4
    );
    transition:.4s;
}

.gradient-btn:hover{
    transform:scale(1.08);
    filter:brightness(1.15);
}
</style>
</head>
<body>

<h1>Hover Effects Showcase</h1>

<button class="btn">Hover Button</button>

<div class="card">
    <h3>Interactive Card</h3>
    <p>Hover to lift and scale.</p>
</div>

<div class="image-box">
    <img src="https://picsum.photos/300/200" alt="Demo">
</div>

<div class="nav">
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Portfolio</a>
    <a href="#">Contact</a>
</div>

<div class="glow">Glow Hover</div>

<br>

<button class="gradient-btn">
    Gradient Hover
</button>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Exam Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fc;
}

/* Header */
.header{
    background:#2563eb;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

.timer{
    background:white;
    color:#2563eb;
    padding:8px 15px;
    border-radius:8px;
    font-weight:bold;
}

/* Layout */
.container{
    display:flex;
    min-height:calc(100vh - 70px);
}

/* Sidebar */
.sidebar{
    width:260px;
    background:#fff;
    padding:20px;
    box-shadow:2px 0 10px rgba(0,0,0,.08);
}

.sidebar h3{
    margin-bottom:15px;
}

.exam-card{
    background:#f8fafc;
    padding:12px;
    border-radius:10px;
    margin-bottom:12px;
    border-left:4px solid #2563eb;
}

/* Main Content */
.main{
    flex:1;
    padding:25px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.card h4{
    color:#64748b;
}

.card h2{
    margin-top:10px;
}

/* Question Box */
.question-box{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.question{
    margin-bottom:20px;
}

.option{
    display:block;
    margin:12px 0;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    cursor:pointer;
}

.option:hover{
    background:#f1f5f9;
}

.buttons{
    margin-top:20px;
    display:flex;
    gap:10px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.next{
    background:#2563eb;
    color:white;
}

.submit{
    background:#10b981;
    color:white;
}

@media(max-width:768px){
    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">Online Exam Portal</div>
    <div class="timer" id="timer">30:00</div>
</div>

<div class="container">

    <div class="sidebar">
        <h3>Available Exams</h3>

        <div class="exam-card">
            <strong>Mathematics</strong><br>
            50 Questions
        </div>

        <div class="exam-card">
            <strong>Computer Science</strong><br>
            40 Questions
        </div>

        <div class="exam-card">
            <strong>Physics</strong><br>
            45 Questions
        </div>
    </div>

    <div class="main">

        <div class="dashboard">
            <div class="card">
                <h4>Total Questions</h4>
                <h2>50</h2>
            </div>

            <div class="card">
                <h4>Answered</h4>
                <h2>12</h2>
            </div>

            <div class="card">
                <h4>Remaining</h4>
                <h2>38</h2>
            </div>

            <div class="card">
                <h4>Marks</h4>
                <h2>100</h2>
            </div>
        </div>

        <div class="question-box">

            <div class="question">
                <h3>Q1. Which language is used for web page structure?</h3>
            </div>

            <label class="option">
                <input type="radio" name="q1"> Java
            </label>

            <label class="option">
                <input type="radio" name="q1"> Python
            </label>

            <label class="option">
                <input type="radio" name="q1"> HTML
            </label>

            <label class="option">
                <input type="radio" name="q1"> C++
            </label>

            <div class="buttons">
                <button class="next">Next Question</button>
                <button class="submit" onclick="submitExam()">
                    Submit Exam
                </button>
            </div>

        </div>

    </div>

</div>

<script>
// Countdown Timer
let time = 30 * 60;

const timer = document.getElementById("timer");

setInterval(() => {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    timer.innerHTML =
        String(minutes).padStart(2,'0') + ":" +
        String(seconds).padStart(2,'0');

    if(time > 0){
        time--;
    }
}, 1000);

function submitExam(){
    alert("Exam Submitted Successfully!");
}
</script>

</body>
</html>

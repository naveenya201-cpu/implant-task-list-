<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.todo-container{
    width:100%;
    max-width:500px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#111827;
}

.input-group{
    display:flex;
    gap:10px;
}

.input-group input{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

.input-group button{
    padding:12px 18px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.input-group button:hover{
    background:#1d4ed8;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    background:#f9fafb;
    border-radius:8px;
    margin-bottom:10px;
}

.completed{
    text-decoration:line-through;
    opacity:.6;
}

.actions{
    display:flex;
    gap:8px;
}

.complete-btn{
    background:#16a34a;
}

.delete-btn{
    background:#dc2626;
}

.actions button{
    border:none;
    color:white;
    padding:6px 10px;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="todo-container">

    <h2>My To-Do List</h2>

    <div class="input-group">
        <input
            type="text"
            id="taskInput"
            placeholder="Enter a task..."
        >

        <button onclick="addTask()">
            Add
        </button>
    </div>

    <ul id="taskList"></ul>

</div>

<script>
const taskInput =
document.getElementById("taskInput");

const taskList =
document.getElementById("taskList");

let tasks =
JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
    localStorage.setItem(
        "tasks",
        JSON.stringify(tasks)
    );
}

function renderTasks(){

    taskList.innerHTML = "";

    tasks.forEach((task,index)=>{

        const li =
        document.createElement("li");

        li.innerHTML = `
            <span class="${task.completed ?
                'completed' : ''}">
                ${task.text}
            </span>

            <div class="actions">

                <button
                    class="complete-btn"
                    onclick="toggleTask(${index})">
                    ✓
                </button>

                <button
                    class="delete-btn"
                    onclick="deleteTask(${index})">
                    ✕
                </button>

            </div>
        `;

        taskList.appendChild(li);
    });
}

function addTask(){

    const text =
    taskInput.value.trim();

    if(text === "") return;

    tasks.push({
        text:text,
        completed:false
    });

    taskInput.value = "";

    saveTasks();
    renderTasks();
}

function toggleTask(index){

    tasks[index].completed =
    !tasks[index].completed;

    saveTasks();
    renderTasks();
}

function deleteTask(index){

    tasks.splice(index,1);

    saveTasks();
    renderTasks();
}

taskInput.addEventListener(
    "keypress",
    function(e){
        if(e.key==="Enter"){
            addTask();
        }
    }
);

renderTasks();
</script>

</body>
</html>

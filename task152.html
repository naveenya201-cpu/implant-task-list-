<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Gestures Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.phone{
    width:360px;
    height:700px;
    background:#1e293b;
    border-radius:30px;
    overflow:hidden;
    position:relative;
}

.header{
    text-align:center;
    padding:20px;
    background:#334155;
}

.refresh{
    text-align:center;
    padding:10px;
    color:#38bdf8;
    font-size:14px;
}

.card-container{
    display:flex;
    transition:transform .4s ease;
    width:1080px;
}

.card{
    width:360px;
    padding:40px;
    text-align:center;
}

.card h2{
    margin-bottom:15px;
}

.like{
    font-size:60px;
    opacity:0;
    transform:scale(.5);
    transition:.3s;
}

.like.show{
    opacity:1;
    transform:scale(1.2);
}

.bottom-sheet{
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    background:#475569;
    border-radius:20px 20px 0 0;
    padding:15px;
}

.handle{
    width:50px;
    height:5px;
    background:#cbd5e1;
    margin:auto;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="phone">

    <div class="header">
        Mobile Gestures Demo
    </div>

    <div class="refresh" id="refreshText">
        Pull down to refresh
    </div>

    <div class="card-container" id="slider">

        <div class="card">
            <h2>Card 1</h2>
            <p>Swipe left →</p>
        </div>

        <div class="card">
            <h2>Card 2</h2>
            <p>Double tap screen ❤️</p>
            <div class="like" id="heart">❤️</div>
        </div>

        <div class="card">
            <h2>Card 3</h2>
            <p>Long press anywhere</p>
        </div>

    </div>

    <div class="bottom-sheet">
        <div class="handle"></div>
        <p style="text-align:center;margin-top:20px;">
            Drag Handle (UI Demo)
        </p>
    </div>

</div>

<script>
let startX = 0;
let current = 0;

const slider = document.getElementById("slider");
const phone = document.querySelector(".phone");

// Swipe Gesture
phone.addEventListener("touchstart",(e)=>{
    startX = e.touches[0].clientX;
});

phone.addEventListener("touchend",(e)=>{
    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;

    if(diff > 50 && current < 2){
        current++;
    }

    if(diff < -50 && current > 0){
        current--;
    }

    slider.style.transform =
      `translateX(-${current * 360}px)`;
});

// Double Tap Like
let lastTap = 0;

phone.addEventListener("touchend",()=>{
    const now = Date.now();

    if(now - lastTap < 300){
        const heart =
            document.getElementById("heart");

        heart.classList.add("show");

        setTimeout(()=>{
            heart.classList.remove("show");
        },1000);
    }

    lastTap = now;
});

// Long Press
let pressTimer;

phone.addEventListener("touchstart",()=>{
    pressTimer = setTimeout(()=>{
        alert("Long Press Detected");
    },800);
});

phone.addEventListener("touchend",()=>{
    clearTimeout(pressTimer);
});

// Simulated Pull To Refresh
let startY = 0;

phone.addEventListener("touchstart",(e)=>{
    startY = e.touches[0].clientY;
});

phone.addEventListener("touchend",(e)=>{
    let endY = e.changedTouches[0].clientY;

    if(endY - startY > 120){
        const txt =
          document.getElementById("refreshText");

        txt.innerHTML = "Refreshing...";

        setTimeout(()=>{
            txt.innerHTML =
             "Refresh Complete ✓";
        },1500);
    }
});
</script>

</body>
</html>

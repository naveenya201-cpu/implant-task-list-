<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Grid System</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 10px;
        padding: 20px;
    }

    .box {
        background-color: #4CAF50;
        color: white;
        text-align: center;
        padding: 20px;
        border-radius: 5px;
    }

    /* Desktop */
    .col-4 {
        grid-column: span 4;
    }

    .col-6 {
        grid-column: span 6;
    }

    .col-12 {
        grid-column: span 12;
    }

    /* Tablet */
    @media (max-width: 768px) {
        .col-4,
        .col-6 {
            grid-column: span 6;
        }
    }

    /* Mobile */
    @media (max-width: 480px) {
        .col-4,
        .col-6,
        .col-12 {
            grid-column: span 12;
        }
    }
</style>
</head>

<body>

<div class="container">
    <div class="box col-4">Column 1</div>
    <div class="box col-4">Column 2</div>
    <div class="box col-4">Column 3</div>

    <div class="box col-6">Column 4</div>
    <div class="box col-6">Column 5</div>

    <div class="box col-12">Full Width Column</div>
</div>

</body>
</html>

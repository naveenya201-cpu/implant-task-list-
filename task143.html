<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot Wireframe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:#EEF2FF;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.chat-app{
    width:1200px;
    height:760px;
    background:#fff;
    border-radius:24px;
    overflow:hidden;
    display:grid;
    grid-template-columns:280px 1fr;
    box-shadow:0 12px 40px rgba(0,0,0,.12);
}

/* Sidebar */
.sidebar{
    background:#111827;
    padding:20px;
    color:white;
    display:flex;
    flex-direction:column;
    gap:16px;
}

.logo{
    height:60px;
    border:2px dashed rgba(255,255,255,.4);
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.new-chat{
    background:linear-gradient(135deg,#7C3AED,#3B82F6);
    padding:14px;
    border-radius:12px;
    text-align:center;
    color:white;
    font-weight:600;
}

.history{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.history-item{
    height:48px;
    border:2px dashed rgba(255,255,255,.3);
    border-radius:10px;
}

/* Main Chat */
.main{
    display:grid;
    grid-template-rows:70px 1fr 90px;
}

/* Header */
.header{
    border-bottom:1px solid #e5e7eb;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 24px;
}

.bot-info,
.user-menu{
    width:180px;
    height:40px;
    border:2px dashed #CBD5E1;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Chat Area */
.chat-area{
    padding:24px;
    overflow:auto;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.message{
    max-width:65%;
    min-height:70px;
    border-radius:18px;
    padding:16px;
    border:2px dashed #CBD5E1;
    display:flex;
    align-items:center;
}

.user{
    align-self:flex-end;
    background:#EEF2FF;
}

.bot{
    align-self:flex-start;
    background:#F8FAFC;
}

/* Suggestions */
.suggestions{
    display:flex;
    gap:12px;
    margin-top:10px;
}

.chip{
    padding:10px 16px;
    border:2px dashed #CBD5E1;
    border-radius:999px;
    background:white;
}

/* Composer */
.composer{
    border-top:1px solid #e5e7eb;
    padding:16px 24px;
    display:flex;
    gap:12px;
    align-items:center;
}

.input{
    flex:1;
    height:56px;
    border:2px dashed #CBD5E1;
    border-radius:14px;
    display:flex;
    align-items:center;
    padding-left:16px;
    color:#94A3B8;
}

.send{
    width:120px;
    height:56px;
    background:linear-gradient(135deg,#7C3AED,#3B82F6);
    color:white;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
}
</style>
</head>

<body>

<div class="chat-app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">AI Assistant</div>

        <div class="new-chat">
            + New Chat
        </div>

        <div class="history">
            <div class="history-item"></div>
            <div class="history-item"></div>
            <div class="history-item"></div>
            <div class="history-item"></div>
            <div class="history-item"></div>
        </div>
    </aside>

    <!-- Main Area -->
    <main class="main">

        <!-- Header -->
        <header class="header">
            <div class="bot-info">Assistant Settings</div>
            <div class="user-menu">Profile</div>
        </header>

        <!-- Messages -->
        <section class="chat-area">

            <div class="message bot">
                Welcome! How can I help you today?
            </div>

            <div class="suggestions">
                <div class="chip">Summarize a document</div>
                <div class="chip">Generate ideas</div>
                <div class="chip">Write an email</div>
            </div>

            <div class="message user">
                User Question Placeholder
            </div>

            <div class="message bot">
                AI Response Placeholder
            </div>

        </section>

        <!-- Input -->
        <div class="composer">
            <div class="input">
                Type your message...
            </div>

            <div class="send">
                Send
            </div>
        </div>

    </main>

</div>

</body>
</html>

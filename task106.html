<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning App UI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6fb;
}

/* Header */
header {
  background: #4f46e5;
  color: white;
  padding: 20px;
  border-radius: 0 0 20px 20px;
}

/* Course card */
.card {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.progress {
  height: 8px;
  background: #ddd;
  border-radius: 5px;
  margin: 10px 0;
  width:500px;
}

.bar {
  height: 8px;
  width: 40%;
  background: #4f46e5;
  border-radius: 5px;
}

/* Button */
button {
  background: #4f46e5;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  width: 500px;
}

/* Bottom nav */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<header>
  <h2>Hi Student 👋</h2>
  <p>Continue your learning journey</p>
</header>

<div class="card">
  <h3>HTML Basics</h3>
  <p>Progress: 40%</p>

  <div class="progress">
    <div class="bar"></div>
  </div>

  <button onclick="enroll(this)">Continue</button>
</div>

<div class="card">
  <h3>CSS Mastery</h3>
  <p>Progress: 65%</p>

  <div class="progress">
    <div class="bar" style="width:65%"></div>
  </div>

  <button onclick="enroll(this)">Continue</button>
</div>

<div class="card">
  <h3>JavaScript Basics</h3>
  <p>Progress: 20%</p>

  <div class="progress">
    <div class="bar" style="width:20%"></div>
  </div>

  <button onclick="enroll(this)">Start Learning</button>
</div>

<div class="nav">
  <span>🏠</span>
  <span>📚</span>
  <span>🎥</span>
  <span>👤</span>
</div>

<script>
function enroll(btn) {
  btn.innerText = "Enrolled ✓";
}
</script>

</body>
</html>

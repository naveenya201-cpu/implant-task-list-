<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Layout System</title>

<style>
:root{
    --bg:#0f172a;
    --panel:#1e293b;
    --text:#f8fafc;
    --muted:#94a3b8;
    --primary:#6366f1;
    --border:#334155;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    padding:40px;
}

/* ===== AUTO LAYOUT SYSTEM ===== */

.stack{
    display:flex;
    flex-direction:column;
    gap:16px; /* auto spacing */
}

.row{
    display:flex;
    flex-direction:row;
    gap:16px;
    align-items:center;
}

.wrap{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
}

/* ===== COMPONENTS ===== */

.card{
    background:var(--panel);
    padding:16px;
    border-radius:14px;
    border:1px solid var(--border);
    flex:1;
    min-width:200px;
    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
}

/* Button auto-size */
.btn{
    background:var(--primary);
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
    width:auto;
    display:inline-flex;
    align-items:center;
    gap:8px;
}

.btn:hover{
    transform:scale(1.05);
}

/* Badge */
.badge{
    display:inline-flex;
    padding:4px 10px;
    border-radius:20px;
    background:#06b6d4;
    color:black;
    font-size:12px;
}

/* Input auto layout */
.input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#0f172a;
    color:white;
}

/* SECTION */
.section{
    margin-bottom:40px;
}

.title{
    margin-bottom:10px;
    color:var(--muted);
}
</style>
</head>
<body>

<!-- STACK LAYOUT (VERTICAL AUTO FLOW) -->
<div class="section stack">

    <h1>Auto Layout System</h1>
    <p class="title">Vertical stack with automatic spacing (like Figma Auto Layout)</p>

    <!-- ROW LAYOUT -->
    <div class="row">

        <div class="card">
            <span class="badge">New</span>
            <h3>Card 1</h3>
            <p>Auto spacing inside row layout.</p>
        </div>

        <div class="card">
            <span class="badge">Pro</span>
            <h3>Card 2</h3>
            <p>Flexible width distribution.</p>
        </div>

        <div class="card">
            <span class="badge">Hot</span>
            <h3>Card 3</h3>
            <p>Responsive auto layout behavior.</p>
        </div>

    </div>

</div>

<!-- WRAP LAYOUT -->
<div class="section">

    <h2 class="title">Wrap Layout (Responsive Flow)</h2>

    <div class="wrap">

        <button class="btn">Button A</button>
        <button class="btn">Button B</button>
        <button class="btn">Button C</button>
        <button class="btn">Button D</button>
        <button class="btn">Button E</button>

    </div>

</div>

<!-- FORM AUTO LAYOUT -->
<div class="section stack">

    <h2 class="title">Form Auto Layout</h2>

    <input class="input" placeholder="Full Name">
    <input class="input" placeholder="Email Address">
    <input class="input" placeholder="Password">

    <button class="btn">Submit</button>

</div>

</body>
</html>

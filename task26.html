<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#7ca6cb,#345b5d);
    padding:20px;
}

.weather-app{
    width:100%;
    max-width:400px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:25px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:25px;
}

.search-box input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

.search-box button{
    border:none;
    padding:12px 16px;
    border-radius:10px;
    cursor:pointer;
    background:white;
}

.weather-main{
    text-align:center;
}

.weather-icon{
    font-size:70px;
    margin-bottom:10px;
}

.temperature{
    font-size:60px;
    font-weight:bold;
}

.city{
    font-size:24px;
    margin-top:5px;
}

.condition{
    opacity:.9;
    margin-top:5px;
}

.weather-details{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.detail-card{
    background:rgba(255,255,255,.15);
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.detail-card h4{
    font-size:14px;
    margin-bottom:8px;
    opacity:.9;
}

.detail-card p{
    font-weight:bold;
}

@media(max-width:480px){

    .temperature{
        font-size:48px;
    }

    .weather-details{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="weather-app">

    <div class="search-box">
        <input
            type="text"
            placeholder="Enter city name"
            id="cityInput"
        >
        <button onclick="searchWeather()"></button>
    </div>

    <div class="weather-main">
        <div class="weather-icon">☀️</div>

        <div class="temperature">35°C</div>

        <div class="city" id="cityName">
            erode
        </div>

        <div class="condition">
            very sunny
        </div>
    </div>

    <div class="weather-details">

        <div class="detail-card">
            <h4>Humidity</h4>
            <p>35%</p>
        </div>

        <div class="detail-card">
            <h4>Wind</h4>
            <p>5 km/h</p>
        </div>

        <div class="detail-card">
            <h4>Feels Like</h4>
            <p>45°C</p>
        </div>

    </div>

</div>

<script>
function searchWeather(){
    const city =
        document.getElementById("cityInput").value;

    if(city.trim() !== ""){
        document.getElementById("cityName")
            .textContent = city;
    }
}
</script>

</body>
</html>

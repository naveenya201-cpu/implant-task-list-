<!DOCTYPE html>
<html>
<head>
    <title>404 - Page Not Found</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .error-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px lightgray;
            width: 400px;
        }

        .error-code {
            font-size: 80px;
            font-weight: bold;
            color: #007BFF;
            margin: 0;
        }

        .error-message {
            font-size: 24px;
            color: #333;
            margin: 10px 0;
        }

        .error-description {
            color: #666;
            margin-bottom: 20px;
        }

        .home-btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .home-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="error-container">

        <h1 class="error-code">404</h1>

        <h2 class="error-message">
            Page Not Found
        </h2>

        <p class="error-description">
            Sorry, the page you are looking for does not exist
            or has been moved.
        </p>

        <a href="#" class="home-btn">
            Go to Home
        </a>

    </div>

</body>
</html>

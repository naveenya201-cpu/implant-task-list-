<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0b1220;
    color:#e5e7eb;
}

/* Sidebar */
.sidebar{
    width:240px;
    height:100vh;
    background:#111827;
    position:fixed;
    left:0;
    top:0;
    padding:20px;
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:#f59e0b;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:#cbd5e1;
    text-decoration:none;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
}

.sidebar a:hover{
    background:#1f2937;
    color:white;
}

/* Main */
.main{
    margin-left:240px;
    padding:20px;
}

/* Topbar */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.search input{
    padding:10px;
    border-radius:8px;
    border:none;
    width:250px;
    background:#1f2937;
    color:white;
}

/* Cards */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.card h3{
    color:#9ca3af;
    font-size:14px;
}

.card h2{
    margin-top:10px;
    font-size:28px;
}

/* Portfolio */
.portfolio{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:12px;
    border-bottom:1px solid #1f2937;
    text-align:left;
}

th{
    color:#9ca3af;
}

.positive{
    color:#22c55e;
}

.negative{
    color:#ef4444;
}

/* Chart placeholder */
.chart{
    background:#111827;
    height:250px;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#9ca3af;
}

/* Responsive */
@media(max-width:768px){
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        margin-left:0;
    }
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">CryptoX</div>
    <a href="#">Dashboard</a>
    <a href="#">Markets</a>
    <a href="#">Portfolio</a>
    <a href="#">Trade</a>
    <a href="#">Wallet</a>
</div>

<div class="main">

    <div class="topbar">
        <h2>Dashboard</h2>
        <div class="search">
            <input type="text" placeholder="Search coin...">
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Total Balance</h3>
            <h2>$12,450</h2>
        </div>

        <div class="card">
            <h3>Bitcoin</h3>
            <h2>+2.4%</h2>
        </div>

        <div class="card">
            <h3>Ethereum</h3>
            <h2>+1.8%</h2>
        </div>

        <div class="card">
            <h3>Loss Today</h3>
            <h2>-0.6%</h2>
        </div>
    </div>

    <div class="portfolio">
        <h3>Portfolio Overview</h3>
        <div class="chart">
            📊 Chart Area (Add Chart.js here later)
        </div>
    </div>

    <div class="portfolio">
        <h3>Market Prices</h3>
        <table>
            <tr>
                <th>Coin</th>
                <th>Price</th>
                <th>24h Change</th>
            </tr>

            <tr>
                <td>Bitcoin</td>
                <td>$65,000</td>
                <td class="positive">+2.5%</td>
            </tr>

            <tr>
                <td>Ethereum</td>
                <td>$3,200</td>
                <td class="negative">-1.2%</td>
            </tr>

            <tr>
                <td>Solana</td>
                <td>$145</td>
                <td class="positive">+3.8%</td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>

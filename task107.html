<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Streaming UI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* Header */
header {
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* Featured banner */
.banner {
  margin: 10px;
  height: 180px;
  border-radius: 12px;
  background: url("https://picsum.photos/600/300") center/cover;
  display: flex;
  align-items: flex-end;
  padding: 10px;
}

/* Categories */
.categories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 10px;
}

.cat {
  background: #222;
  padding: 8px 14px;
  border-radius: 20px;
  white-space: nowrap;
}

/* Movie grid */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.movie {
  background: #1c1c1c;
  border-radius: 10px;
  overflow: hidden;
}

.movie img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.movie p {
  margin: 8px;
  font-size: 14px;
}

/* Bottom nav */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  border-top: 1px solid #333;
}
</style>
</head>

<body>

<header>🎬 StreamFlix</header>

<!-- Featured -->
<div class="banner">
  <h3>Featured Movie</h3>
</div>

<!-- Categories -->
<div class="categories">
  <div class="cat">Trending</div>
  <div class="cat">Action</div>
  <div class="cat">Comedy</div>
  <div class="cat">Drama</div>
  <div class="cat">Horror</div>
</div>

<!-- Movies -->
<div class="grid">

  <div class="movie">
    <img src="https://picsum.photos/200/300?1">
    <p>Movie 1</p>
  </div>

  <div class="movie">
    <img src="https://picsum.photos/200/300?2">
    <p>Movie 2</p>
  </div>

  <div class="movie">
    <img src="https://picsum.photos/200/300?3">
    <p>Movie 3</p>
  </div>

  <div class="movie">
    <img src="https://picsum.photos/200/300?4">
    <p>Movie 4</p>
  </div>

</div>

<!-- Bottom Nav -->
<div class="nav">
  <span>🏠</span>
  <span>🔍</span>
  <span>🎬</span>
  <span>❤️</span>
  <span>👤</span>
</div>

</body>
</html>

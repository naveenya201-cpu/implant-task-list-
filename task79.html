<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonials</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f8;
      padding: 40px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* Grid */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    /* Card */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .user {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .user img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
    }

    .name {
      font-weight: bold;
    }

    .role {
      font-size: 12px;
      color: gray;
    }

    .text {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>

<body>

<h2>💬 What Our Users Say</h2>

<div class="container">

  <div class="card">
    <div class="user">
      <img src="https://i.pravatar.cc/100?img=1" alt="user">
      <div>
        <div class="name">laraa</div>
        <div class="role">Developer</div>
      </div>
    </div>
    <div class="text">
      This service is amazing! It helped me build projects faster and easier.
    </div>
  </div>

  <div class="card">
    <div class="user">
      <img src="https://i.pravatar.cc/100?img=2" alt="user">
      <div>
        <div class="name">nithya</div>
        <div class="role">Designer</div>
      </div>
    </div>
    <div class="text">
      The UI designs are clean and modern. I love using this platform.
    </div>
  </div>

  <div class="card">
    <div class="user">
      <img src="https://i.pravatar.cc/100?img=3" alt="user">
      <div>
        <div class="name">Miraa</div>
        <div class="role">Entrepreneur</div>
      </div>
    </div>
    <div class="text">
      Great experience! Very smooth and responsive design system.
    </div>
  </div>

</div>

</body>
</html>

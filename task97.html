<!DOCTYPE html>
<html>
<head>
    <title>Empty State</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .empty-state {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px lightgray;
            width: 350px;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="empty-state">

        <div class="empty-icon">
            📭
        </div>

        <h2>No Messages Found</h2>

        <p>
            You don't have any messages yet.
            Start a new conversation to see messages here.
        </p>

        <button>Start Chat</button>

    </div>

</body>
</html>

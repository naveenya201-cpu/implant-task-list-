<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sticky Sidebar Example</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      height: 100vh;
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      position: sticky;
      top: 0; /* makes it sticky */
    }

    .sidebar h2 {
      margin-top: 0;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 10px 0;
      padding: 5px;
    }

    .sidebar a:hover {
      background-color: #34495e;
    }

    /* Main content */
    .content {
      flex: 1;
      padding: 20px;
    }

    .box {
      height: 800px; /* just to enable scrolling */
      background: linear-gradient(white, #f0f0f0);
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="sidebar">
      <h2>Menu</h2>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>

    <div class="content">
      <h1>Main Content</h1>
      <p>Scroll down to see the sticky sidebar in action.</p>

      <div class="box">
        <p>Keep scrolling...</p>
      </div>
    </div>

  </div>
</body>
</html>

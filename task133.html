<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heuristic Evaluation Studio</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Sora',sans-serif;
}

body{
min-height:100vh;
background:#fff8ff;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

/* Abstract Background */

.blob{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:.5;
}

.b1{
width:400px;
height:400px;
background:#d8b4fe;
top:-150px;
left:-100px;
}

.b2{
width:500px;
height:500px;
background:#f9a8d4;
right:-150px;
top:100px;
}

.b3{
width:350px;
height:350px;
background:#c4b5fd;
bottom:-120px;
left:30%;
}

.container{
position:relative;
width:900px;
height:900px;
}

/* Center Core */

.core{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

width:240px;
height:240px;

border-radius:50%;

background:
linear-gradient(
135deg,
#9333ea,
#ec4899
);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

color:white;

box-shadow:
0 25px 50px rgba(147,51,234,.3);
}

.core h1{
font-size:24px;
margin-bottom:10px;
}

.score{
font-size:60px;
font-weight:700;
}

/* Petals */

.petal{

position:absolute;

width:180px;
padding:18px;

background:white;
border-radius:30px;

box-shadow:
0 15px 35px rgba(0,0,0,.08);

text-align:center;

cursor:pointer;
transition:.3s;
}

.petal:hover{
transform:scale(1.05);
}

.petal h3{
font-size:14px;
color:#9333ea;
margin-bottom:10px;
}

.petal input{

width:100%;
padding:10px;

border:none;
background:#f7f1ff;

border-radius:12px;
text-align:center;
}

/* Circle Layout */

.p1{top:40px;left:360px;}
.p2{top:140px;right:80px;}
.p3{top:350px;right:0;}
.p4{bottom:180px;right:80px;}
.p5{bottom:40px;left:360px;}

.p6{bottom:180px;left:80px;}
.p7{top:350px;left:0;}
.p8{top:140px;left:80px;}

.save{
position:absolute;
left:50%;
bottom:-40px;
transform:translateX(-50%);

padding:16px 35px;

border:none;
border-radius:999px;

background:
linear-gradient(
135deg,
#9333ea,
#ec4899
);

color:white;
font-weight:600;
cursor:pointer;
}

</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="container">

<div class="core">
<h1>Heuristic Score</h1>
<div class="score" id="score">0</div>
</div>

<div class="petal p1">
<h3>Visibility of Status</h3>
<input type="number" class="rating" min="1" max="10">
</div>

<div class="petal p2">
<h3>Match Real World</h3>
<input type="number" class="rating" min="1" max="10">
</div>

<div class="petal p3">
<h3>User Control</h3>
<input type="number" class="rating" min="1" max="10">
</div>

<div class="petal p4">
<h3>Consistency</h3>
<input type="number" class="rating" min="1" max="10">
</div>

<div class="petal p5">
<h3>Error Prevention</h3>
<input type="number" class="rating" min="1" max="10">
</div>

<div class="petal p6">
<h3>Recognition</h3>
<input type="number" class="rating" min="1" max="10">
</div>

<div class="petal p7">
<h3>Flexibility</h3>
<input type="number" class="rating" min="1" max="10">
</div>

<div class="petal p8">
<h3>Minimal Design</h3>
<input type="number" class="rating" min="1" max="10">
</div>

<button class="save" onclick="calculateScore()">
Calculate Evaluation
</button>

</div>

<script>

function calculateScore(){

const ratings =
document.querySelectorAll('.rating');

let total = 0;
let count = 0;

ratings.forEach(r=>{

if(r.value){
total += Number(r.value);
count++;
}

});

const score =
count ? (total/count).toFixed(1) : 0;

document.getElementById('score')
.innerText = score;

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecommerce App</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
  }

  header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 18px;
  }

  .cart {
    position: absolute;
    right: 15px;
    top: 15px;
    background: red;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
  }

  .container {
    padding: 10px;
  }

  .product {
    background: white;
    margin: 50px 0;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .product h3 {
    margin: 0;
  }

  .price {
    color: green;
    margin: 5px 0;
  }

  button {
    background: #111;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
  }

  footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: white;
    padding: 10px;
    border-top: 1px solid #ddd;
  }
</style>
</head>

<body>

<header>
  🛍️ My Shop
  <span class="cart">Cart: <span id="count">0</span></span>
</header>

<div class="container">

  <div class="product">
    <h3>T-Shirt</h3>
    <p class="price">₹499</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="product">
    <h3>Shoes</h3>
    <p class="price">₹1299</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="product">
    <h3>Watch</h3>
    <p class="price">₹999</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

</div>

<footer>
  <span>🏠 Home</span>
  <span>🔍 Search</span>
  <span>🛒 Cart</span>
  <span>👤 Profile</span>
</footer>

<script>
  let count = 0;

  function addToCart() {
    count++;
    document.getElementById("count").innerText = count;
  }
</script>

</body>
</html>

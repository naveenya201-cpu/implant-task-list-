<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Booking UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

/* Navbar */
header{
    background:#111827;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav a{
    color:#cbd5e1;
    margin-left:15px;
    text-decoration:none;
}

nav a:hover{
    color:white;
}

/* Hero */
.hero{
    background:linear-gradient(135deg,#0ea5e9,#2563eb);
    color:white;
    padding:60px 20px;
    text-align:center;
}

.hero h1{
    font-size:36px;
    margin-bottom:10px;
}

/* Search box */
.search-box{
    margin-top:20px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

.search-box input,
.search-box select{
    padding:10px;
    border:none;
    border-radius:6px;
    outline:none;
}

.search-box button{
    padding:10px 15px;
    border:none;
    background:#16a34a;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* Layout */
.container{
    max-width:1200px;
    margin:30px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:1fr 3fr;
    gap:20px;
}

/* Sidebar */
.sidebar{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    height:fit-content;
}

.sidebar h3{
    margin-bottom:10px;
}

.sidebar label{
    display:block;
    margin:8px 0;
    font-size:14px;
}

/* Cards */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin-bottom:5px;
}

.price{
    color:#16a34a;
    font-weight:bold;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* Responsive */
@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<header>
    <div><strong>TravelX</strong></div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Hotels</a>
        <a href="#">Flights</a>
        <a href="#">Offers</a>
    </nav>
</header>

<section class="hero">
    <h1>Find Your Perfect Stay ✈️</h1>
    <p>Book hotels, flights & holiday packages</p>

    <div class="search-box">
        <input type="text" placeholder="Destination">
        <input type="date">
        <select>
            <option>1 Guest</option>
            <option>2 Guests</option>
            <option>3 Guests</option>
        </select>
        <button>Search</button>
    </div>
</section>

<div class="container">

    <!-- Sidebar filters -->
    <div class="sidebar">
        <h3>Filters</h3>

        <label><input type="checkbox"> Free Cancellation</label>
        <label><input type="checkbox"> Breakfast Included</label>
        <label><input type="checkbox"> 4★ & Above</label>
        <label><input type="checkbox"> Under ₹3000</label>
    </div>

    <!-- Hotel Listings -->
    <div class="grid">

        <div class="card">
            
            <div class="card-content">
                <h3>Sea View Resort</h3>
                <p>Goa, India</p>
                <div class="price">₹3500 / night</div>
                <button onclick="book('Sea View Resort')">Book Now</button>
            </div>
        </div>

        <div class="card">
            
            <div class="card-content">
                <h3>Mountain Villa</h3>
                <p>Manali, India</p>
                <div class="price">₹2800 / night</div>
                <button onclick="book('Mountain Villa')">Book Now</button>
            </div>
        </div>

        <div class="card">
           
            <div class="card-content">
                <h3>City Hotel</h3>
                <p>Chennai, India</p>
                <div class="price">₹2200 / night</div>
                <button onclick="book('City Hotel')">Book Now</button>
            </div>
        </div>

        <div class="card">
            
            <div class="card-content">
                <h3>Luxury Palace</h3>
                <p>Dubai</p>
                <div class="price">₹8500 / night</div>
                <button onclick="book('Luxury Palace')">Book Now</button>
            </div>
        </div>

    </div>

</div>

<script>
function book(name){
    alert("Booking confirmed for " + name + " 🎉");
}
</script>

</body>
</html>

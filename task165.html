<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR/VR Interface</title>

<style>
:root{
    --bg:#050816;
    --glass:rgba(255,255,255,0.08);
    --text:#e5e7eb;
    --accent:#60a5fa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:radial-gradient(circle at center,#0f172a,#050816);
    height:100vh;
    overflow:hidden;
    color:var(--text);
}

/* ===== VR SPACE ===== */
.space{
    width:100%;
    height:100%;
    perspective:1000px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Floating Panels */
.panel{
    position:absolute;
    width:220px;
    padding:20px;
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    backdrop-filter:blur(10px);
    transition:transform .6s ease, box-shadow .6s ease;
    transform-style:preserve-3d;
    cursor:pointer;
}

/* Depth positions (VR space) */
.p1{ transform:translate3d(-250px,-120px,-200px); }
.p2{ transform:translate3d(250px,-80px,-150px); }
.p3{ transform:translate3d(-180px,180px,-120px); }
.p4{ transform:translate3d(200px,180px,-250px); }

/* Hover = gaze focus effect */
.panel:hover{
    transform:translate3d(0,0,0) scale(1.1);
    box-shadow:0 20px 60px rgba(96,165,250,0.4);
    z-index:10;
}

/* Center HUD */
.hud{
    position:absolute;
    text-align:center;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.hud h1{
    font-size:28px;
    margin-bottom:10px;
}

.hud p{
    color:#94a3b8;
}

/* Floating animation */
@keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
}

.panel{
    animation:float 6s ease-in-out infinite;
}

/* HUD pointer */
.cursor{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 20px var(--accent);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div class="space">

    <!-- Center HUD -->
    <div class="hud">
        <h1>AR / VR Interface</h1>
        <p>Spatial UI with floating panels</p>
    </div>

    <!-- Floating Panels -->
    <div class="panel p1">
        <h3>Dashboard</h3>
        <p>Analytics in 3D space</p>
    </div>

    <div class="panel p2">
        <h3>Messages</h3>
        <p>Chat floating UI</p>
    </div>

    <div class="panel p3">
        <h3>Settings</h3>
        <p>Control environment</p>
    </div>

    <div class="panel p4">
        <h3>Media</h3>
        <p>3D content viewer</p>
    </div>

    <!-- Gaze Cursor -->
    <div class="cursor"></div>

</div>

<script>
const panels = document.querySelectorAll(".panel");

// subtle cursor movement effect (fake gaze tracking)
document.addEventListener("mousemove",(e)=>{
    const x = (e.clientX / window.innerWidth - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * 20;

    panels.forEach(p=>{
        p.style.transform += ` rotateY(${x}deg) rotateX(${-y}deg)`;
    });
});
</script>

</body>
</html>

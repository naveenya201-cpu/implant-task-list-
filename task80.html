<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reusable UI Components</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 30px;
      
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      
    }

    /* ================= BUTTON ================= */
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
      text-align: center;
    }

    .btn-primary {
      background: #3498db;
      color: white;
    }

    .btn-primary:hover {
      background: #2c80b4;
    }

    .btn-danger {
      background: #e74c3c;
      color: white;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    /* ================= CARD ================= */
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-width: 300px;
      text-align: center;
    }

    /* ================= BADGE ================= */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 20px;
      color: white;
      margin-bottom: 10px;
      text-align: center;
    }

    .badge-success { background: #2ecc71; }
    .badge-warning { background: #f1c40f; color: black; }
    .badge-info { background: #3498db; }

    /* ================= INPUT ================= */
    .input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-top: 10px;
      font-size: 14px;
    }

    /* Layout */
    .section {
      margin-bottom: 30px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
  </style>
</head>

<body>

<h2>🧩 Reusable UI Components</h2>

<!-- BUTTONS -->
<div class="section">
  <h3>Buttons</h3>
  <div class="row">
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-danger">Delete</button>
  </div>
</div>

<!-- CARD -->
<div class="section">
  <h3>Card</h3>
  <div class="card">
    <span class="badge badge-success">Active</span>
    <h4>Product Title</h4>
    <p>This is a reusable card component.</p>
    <button class="btn btn-primary">Buy Now</button>
  </div>
</div>

<!-- INPUT -->
<div class="section">
  <h3>Input Field</h3>
  <input class="input" type="text" placeholder="Enter your name">
</div>

</body>
</html>

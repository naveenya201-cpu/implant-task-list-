<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallax Scrolling Effect</title>

<style>
    body, html {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    /* Parallax Section */
    .parallax {
        background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb');
        height: 100vh;

        background-attachment: fixed;
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;

        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 3rem;
        font-weight: bold;
    }

    /* Normal Content Section */
    .content {
        padding: 80px 40px;
        text-align: center;
        line-height: 1.8;
        background: #f4f4f4;
    }
</style>
</head>
<body>

<div class="parallax">
    Parallax Effect
</div>

<div class="content">
    <h2>Welcome</h2>
    <p>
        Scroll down to see the parallax effect. The background image
        remains fixed while the content scrolls over it.
    </p>
</div>

<div class="parallax">
    Keep Scrolling
</div>

<div class="content">
    <h2>More Content</h2>
    <p>
        This creates a simple and attractive scrolling experience.
    </p>
</div>

</body>
</html>

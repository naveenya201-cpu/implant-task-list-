<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Cards</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f8;
      padding: 40px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* Grid layout */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    /* Card */
    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 10px 0;
    }

    .card p {
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<h2>Our Services 🚀</h2>

<div class="container">

  <div class="card">
    <div class="icon">💻</div>
    <h3>Web Development</h3>
    <p>We build modern and responsive websites.</p>
  </div>

  <div class="card">
    <div class="icon">🎨</div>
    <h3>UI/UX Design</h3>
    <p>Beautiful and user-friendly designs for apps and websites.</p>
  </div>

  <div class="card">
    <div class="icon">📱</div>
    <h3>App Development</h3>
    <p>High-performance mobile applications for Android & iOS.</p>
  </div>

</div>

</body>
</html>

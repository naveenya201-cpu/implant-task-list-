<!DOCTYPE html>
<html>
<head>
    <title>Hero Section</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
        }

        .hero{
            height:100vh;
            background:linear-gradient(to right, #4facfe, #00f2fe);
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            color:white;
        }

        .hero h1{
            font-size:50px;
            margin-bottom:10px;
        }

        .hero p{
            font-size:20px;
            margin-bottom:20px;
        }

        .hero button{
            padding:12px 25px;
            font-size:18px;
            border:none;
            border-radius:5px;
            background:white;
            color:#007BFF;
            cursor:pointer;
        }

        .hero button:hover{
            background:#f0f0f0;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Welcome to Our Website</h1>

        <p>Create amazing experiences with our services.</p>

        <button>Get Started</button>
    </div>

</body>
</html>

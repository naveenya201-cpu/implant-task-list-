<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Popup</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f4f6f9;
}

/* Button */
button{
    padding:12px 18px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* Overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

/* Modal box */
.modal{
    background:white;
    width:300px;
    padding:20px;
    border-radius:12px;
    text-align:center;
    animation:pop 0.3s ease;
}

@keyframes pop{
    from{
        transform:scale(0.7);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* Close button */
.close{
    margin-top:15px;
    background:#dc2626;
}

/* Show class */
.show{
    display:flex;
}
</style>
</head>
<body>

<button onclick="openModal()">Open Modal</button>

<div class="overlay" id="overlay" onclick="outsideClick(event)">

    <div class="modal">
        <h2>Hello 👋</h2>
        <p>This is a modal popup window.</p>

        <button class="close" onclick="closeModal()">Close</button>
    </div>

</div>

<script>
function openModal(){
    document.getElementById("overlay").classList.add("show");
}

function closeModal(){
    document.getElementById("overlay").classList.remove("show");
}

function outsideClick(e){
    if(e.target.id === "overlay"){
        closeModal();
    }
}

/* ESC key close */
document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){
        closeModal();
    }
});
</script>

</body>
</html>

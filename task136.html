<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>High-Fidelity Wireframe Studio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#0b1220;
  color:white;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#111827;
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.08);
}

.sidebar h2{
  margin-bottom:15px;
  font-size:18px;
  color:#38bdf8;
}

.tool{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  color:white;
  background:rgba(255,255,255,0.06);
  transition:0.2s;
}

.tool:hover{
  background:#38bdf8;
  color:#000;
}

/* CANVAS */
.canvas{
  flex:1;
  position:relative;
  background:
    radial-gradient(circle at top left,#0f172a,#050816);
  overflow:hidden;
}

/* HIGH-FI COMPONENTS */
.block{
  position:absolute;
  border-radius:14px;
  padding:12px;
  cursor:move;
  user-select:none;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* HERO */
.hero{
  width:320px;
  height:160px;
  background:linear-gradient(135deg,#7c3aed,#06b6d4);
  color:white;
}

.hero h3{
  font-size:18px;
}

.hero p{
  font-size:12px;
  opacity:0.9;
  margin-top:6px;
}

/* CARD */
.card{
  width:220px;
  height:140px;
  background:#1f2937;
  border:1px solid rgba(255,255,255,0.08);
}

.card h4{
  color:#38bdf8;
  font-size:14px;
}

.card p{
  font-size:11px;
  color:#cbd5e1;
  margin-top:6px;
}

/* BUTTON */
.button{
  width:140px;
  height:40px;
  background:#38bdf8;
  color:#000;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* NAVBAR */
.navbar{
  width:300px;
  height:50px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-size:12px;
}

/* IMAGE */
.image{
  width:200px;
  height:120px;
  background:linear-gradient(135deg,#334155,#0f172a);
  border:1px solid rgba(255,255,255,0.1);
}

/* FOOTER */
.footer{
  width:280px;
  height:60px;
  background:#111827;
  border:1px solid rgba(255,255,255,0.1);
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#94a3b8;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>High-Fidelity UI Kit</h2>

  <button class="tool" onclick="add('hero')">Hero Section</button>
  <button class="tool" onclick="add('card')">Card</button>
  <button class="tool" onclick="add('button')">Button</button>
  <button class="tool" onclick="add('navbar')">Navbar</button>
  <button class="tool" onclick="add('image')">Image Block</button>
  <button class="tool" onclick="add('footer')">Footer</button>
</div>

<!-- CANVAS -->
<div class="canvas" id="canvas"></div>

<script>

const canvas = document.getElementById("canvas");

function add(type){

  const el = document.createElement("div");
  el.classList.add("block", type);

  el.style.left = "120px";
  el.style.top = "120px";

  if(type === "hero"){
    el.innerHTML = `
      <h3>Build Something Great</h3>
      <p>High-fidelity UI preview block</p>
    `;
  }

  if(type === "card"){
    el.innerHTML = `
      <h4>Feature Card</h4>
      <p>This is a UI component preview with modern styling.</p>
    `;
  }

  if(type === "button"){
    el.innerHTML = `Click Me`;
  }

  if(type === "navbar"){
    el.innerHTML = `
      <span>Home</span>
      <span>About</span>
      <span>Contact</span>
    `;
  }

  if(type === "image"){
    el.innerHTML = ``;
  }

  if(type === "footer"){
    el.innerHTML = `© 2026 High-Fidelity Studio`;
  }

  makeDraggable(el);
  canvas.appendChild(el);
}

/* DRAG */
function makeDraggable(el){
  let offsetX, offsetY, dragging=false;

  el.onmousedown = (e)=>{
    dragging=true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
  }

  document.onmousemove = (e)=>{
    if(dragging){
      el.style.left = (e.pageX - offsetX) + "px";
      el.style.top = (e.pageY - offsetY) + "px";
    }
  }

  document.onmouseup = ()=> dragging=false;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

/* Layout */
.app{
    display:grid;
    grid-template-columns:250px 1fr;
    height:100vh;
}

/* Sidebar */
.sidebar{
    background:#111827;
    color:white;
    padding:15px;
    overflow-y:auto;
}

.sidebar h2{
    margin-bottom:15px;
}

.user{
    padding:10px;
    margin-bottom:8px;
    background:#1f2937;
    border-radius:8px;
    cursor:pointer;
}

.user:hover{
    background:#2563eb;
}

/* Chat area */
.chat{
    display:flex;
    flex-direction:column;
    background:white;
}

/* Header */
.chat-header{
    padding:15px;
    background:#111827;
    color:white;
}

/* Messages */
.messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    max-width:60%;
    padding:10px;
    border-radius:10px;
    font-size:14px;
}

.sent{
    align-self:flex-end;
    background:#2563eb;
    color:white;
}

.received{
    align-self:flex-start;
    background:#e5e7eb;
}

/* Input box */
.input-box{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

.input-box input{
    flex:1;
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

.input-box button{
    margin-left:10px;
    padding:10px 15px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.input-box button:hover{
    background:#1d4ed8;
}

/* Responsive */
@media(max-width:768px){
    .app{
        grid-template-columns:1fr;
    }

    .sidebar{
        display:none;
    }
}
</style>
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Chats</h2>
        <div class="user">rio</div>
        <div class="user">Shala</div>
        <div class="user">Abi</div>
        <div class="user">Ella</div>
    </div>

    <!-- Chat Window -->
    <div class="chat">

        <div class="chat-header">
            Chat with John 💬
        </div>

        <div class="messages" id="messages">

            <div class="msg received">Hi </div>
            <div class="msg received">How are you?</div>
            <div class="msg sent">I'm good </div>

        </div>

        <div class="input-box">
            <input type="text" id="msgInput" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>
function sendMessage(){

    let input =
        document.getElementById("msgInput");

    let text = input.value.trim();

    if(text === "") return;

    let msg = document.createElement("div");
    msg.classList.add("msg","sent");
    msg.textContent = text;

    let messages =
        document.getElementById("messages");

    messages.appendChild(msg);

    input.value = "";

    messages.scrollTop = messages.scrollHeight;
}

/* Enter key support */
document.getElementById("msgInput")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>

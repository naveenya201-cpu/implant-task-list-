<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f4f7;
}

header {
  background: #6c5ce7;
  color: white;
  padding: 20px;
  border-radius: 0 0 20px 20px;
}

.card {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.btn {
  background: #6c5ce7;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 8px;
  margin: 5px 0;
  width: 25%;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<header>
  <h2>Hello user101!!!</h2>
  <p>Let’s crush your fitness goal today!</p>
</header>

<div class="card">
  <h3>🔥 Daily Goal</h3>
  <p>Steps: 6,200 / 10,000</p>
</div>

<div class="card">
  <h3>Quick Workouts</h3>
  <button class="btn">💪 Full Body</button>
  <button class="btn">🏃 Cardio</button>
  <button class="btn">🧘 Yoga</button>
</div>

<div class="nav">
  <span>🏠</span>
  <span>🏋️</span>
  <span>📊</span>
  <span>👤</span>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding Animation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:380px;
    height:700px;
    background:#1e293b;
    border-radius:30px;
    overflow:hidden;
    position:relative;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
}

.screen{
    position:absolute;
    inset:0;
    padding:50px 30px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    opacity:0;
    transform:translateX(100%);
    transition:.6s ease;
}

.screen.active{
    opacity:1;
    transform:translateX(0);
}

.icon{
    font-size:90px;
    margin-bottom:25px;
    animation:float 3s infinite ease-in-out;
}

h1{
    margin-bottom:15px;
}

p{
    color:#94a3b8;
    line-height:1.6;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-15px);
    }
}

.controls{
    position:absolute;
    bottom:40px;
    left:0;
    width:100%;
    text-align:center;
}

button{
    background:linear-gradient(
        45deg,
        #6366f1,
        #06b6d4
    );
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.dots{
    margin-bottom:20px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#475569;
    display:inline-block;
    margin:0 5px;
    transition:.3s;
}

.dot.active{
    background:#06b6d4;
    transform:scale(1.4);
}
</style>
</head>
<body>

<div class="container">

    <!-- Screen 1 -->
    <div class="screen active">
        <div class="icon">🚀</div>
        <h1>Welcome</h1>
        <p>
            Discover a faster and smarter way
            to manage your workflow.
        </p>
    </div>

    <!-- Screen 2 -->
    <div class="screen">
        <div class="icon">⚡</div>
        <h1>Stay Productive</h1>
        <p>
            Organize tasks, collaborate,
            and achieve more every day.
        </p>
    </div>

    <!-- Screen 3 -->
    <div class="screen">
        <div class="icon">🎉</div>
        <h1>Ready to Start</h1>
        <p>
            Everything is set up.
            Begin your journey now.
        </p>
    </div>

    <div class="controls">

        <div class="dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>

        <button onclick="nextScreen()">
            Next
        </button>

    </div>

</div>

<script>
const screens = document.querySelectorAll('.screen');
const dots = document.querySelectorAll('.dot');
const btn = document.querySelector('button');

let current = 0;

function nextScreen(){

    screens[current].classList.remove('active');
    dots[current].classList.remove('active');

    current++;

    if(current >= screens.length){
        alert("Welcome to the app!");
        current = 0;
    }

    screens[current].classList.add('active');
    dots[current].classList.add('active');

    if(current === screens.length - 1){
        btn.textContent = "Get Started";
    }else{
        btn.textContent = "Next";
    }
}
</script>

</body>
</html>

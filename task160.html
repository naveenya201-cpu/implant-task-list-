<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design System</title>

<style>
/* ================= TOKENS ================= */
:root{
    --bg:#0b1220;
    --surface:#111c33;
    --surface-2:#16213a;

    --text:#e5e7eb;
    --muted:#94a3b8;

    --primary:#6366f1;
    --success:#10b981;
    --danger:#ef4444;
    --warning:#f59e0b;

    --radius-sm:8px;
    --radius-md:12px;
    --radius-lg:18px;

    --space-1:4px;
    --space-2:8px;
    --space-3:12px;
    --space-4:16px;
    --space-5:24px;
    --space-6:32px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    padding:40px;
}

/* ================= TYPOGRAPHY ================= */
h1{ font-size:32px; margin-bottom:10px; }
h2{ font-size:22px; margin-bottom:10px; }
p{ color:var(--muted); line-height:1.5; }

/* ================= LAYOUT ================= */
.container{
    max-width:1000px;
    margin:auto;
}

.section{
    margin-bottom:40px;
}

/* ================= BUTTON SYSTEM ================= */
.btn{
    border:none;
    padding:10px 16px;
    border-radius:var(--radius-md);
    cursor:pointer;
    transition:.25s;
    margin:6px;
    font-weight:500;
}

/* Variants */
.btn-primary{ background:var(--primary); color:white; }
.btn-success{ background:var(--success); color:white; }
.btn-danger{ background:var(--danger); color:white; }
.btn-ghost{
    background:transparent;
    border:1px solid #334155;
    color:var(--text);
}

/* Hover */
.btn:hover{
    transform:translateY(-2px);
    opacity:.9;
}

/* ================= CARD SYSTEM ================= */
.card{
    background:var(--surface);
    padding:20px;
    border-radius:var(--radius-lg);
    border:1px solid #1f2a44;
    margin:10px 0;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    background:var(--surface-2);
}

/* ================= INPUT SYSTEM ================= */
.input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:var(--radius-md);
    border:1px solid #2b3a5a;
    background:#0b1220;
    color:var(--text);
    outline:none;
    transition:.2s;
}

.input:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(99,102,241,.2);
}

/* ================= BADGES ================= */
.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    font-size:12px;
    margin-right:6px;
}

.badge-primary{ background:rgba(99,102,241,.2); color:var(--primary); }
.badge-success{ background:rgba(16,185,129,.2); color:var(--success); }
.badge-warning{ background:rgba(245,158,11,.2); color:var(--warning); }

/* ================= GRID ================= */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:16px;
}
</style>
</head>

<body>

<div class="container">

    <!-- INTRO -->
    <div class="section">
        <h1>Design System</h1>
        <p>Reusable UI foundation with tokens, components, and rules.</p>
    </div>

    <!-- COLORS / BADGES -->
    <div class="section">
        <h2>Color Tokens (Badges)</h2>

        <span class="badge badge-primary">Primary</span>
        <span class="badge badge-success">Success</span>
        <span class="badge badge-warning">Warning</span>
    </div>

    <!-- BUTTONS -->
    <div class="section">
        <h2>Buttons</h2>

        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-success">Success</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-ghost">Ghost</button>
    </div>

    <!-- CARDS -->
    <div class="section">
        <h2>Cards</h2>

        <div class="grid">

            <div class="card">
                <h3>Base Card</h3>
                <p>Standard container component.</p>
            </div>

            <div class="card">
                <h3>Interactive Card</h3>
                <p>Hover-enabled UI block with depth.</p>
            </div>

            <div class="card">
                <h3>System Card</h3>
                <p>Used for dashboards and layouts.</p>
            </div>

        </div>
    </div>

    <!-- INPUTS -->
    <div class="section">
        <h2>Inputs</h2>

        <input class="input" placeholder="Enter name">
        <input class="input" placeholder="Email address">
        <input class="input" placeholder="Password">
    </div>

</div>

</body>
</html>
